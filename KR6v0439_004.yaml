body:
  text: 夫三諦者天然之性德也中諦者統一切法真諦者泯一切法俗諦者立一切法舉一即三非前後也含生本具非造作之所得也悲夫祕藏不顯蓋三惑之所覆也故無明翳乎法性塵沙障乎化導見思阻乎空寂然茲三惑乃體上之虛妄也於是大覺慈尊喟然歎曰真如界內絶生佛之假名平等慧中無自他之形相但以衆生妄想不自證得莫之能返也由是立乎三觀破乎三惑證乎三智成乎三德空觀宗者破見思惑證一切智成般若德假觀宗者破塵沙惑證道種智成解脫德中觀宗者破無明惑證一切種智成法身德然茲三惑三觀三智三德非各別也非異時也天然之理具諸法故然此三諦之宗性德之自爾迷兹三諦之宗旨轉成三惑惑破籍乎三觀之風智教觀成則即證於三智之宗旨三智則即開乎三德之異門妙哉從因至果非漸修也説之次第理非次第大綱如此網目可尋矣可驚之法皇音永絶而鷲峰山暮嵐獨吟可照慈尊月未出而雞頭城曉空猶遙生佛前佛後之中間無出離解脫之因緣住粟散扶桑之小國闕上求下化之修行雖爾宋元逮明台教暨法相三論之義學已失中華況至今清朝禪教屢盛而講經者專主禪意論之矣假饒雖入唐渡天難解教相疑條乎教黌之興盛於吾本朝雖中華之大德有未明之者如佛祖統紀及唐決疑集所載嗚呼八相成道之昔獨雖漏如來之出世三千餘季之今僅得聞慈父遺誡寶聚之山際不望自入也貧匱之家中不取後悔乎難受易移人身難值希得佛法當以何行業為今生思出默止於此者盍失大利哉況一入惡趣已曠劫為難出設亦受人身值佛法最難早拋萬事當勵一心實非此度者始而企何時哉然則始自今日盡未來際苟以我身命恭拋佛法僧以求佛道以利有情因之或結草菴於山林寂漠之霞暫為今生遊宴之栖或捧一鉢於聚落憒閙之煙永萠一佛淨土之緣所以和光同塵之本願結緣始其何所謂道心是也世間淺近益皆為此方便也仰願三寶神祇哀愍愚意令發道心一要若成就萬事皆可足而已於是佛陀勸我等八萬四千法門寧又非彼岸直至之指南乎去來別離無常恩愛而不退聖衆為友不忘堅固之契約而盡未來際為限恆為親友互助佛道鎮為法器同營善事諸宗門戶敲之集於宗要三一者空宗二者假宗三者中宗金錍云天台大師是余師也三諦三觀所承法也所以以五時八教判釋本朝諸宗聖教罄無不盡言五時者一華嚴時二鹿苑時謂説四阿含三方等時謂説維摩思益楞伽楞嚴三昧金光明勝鬘等經四般若時謂説摩訶般若光讚般若金剛般若大品般若等諸般若經五法華涅槃時是為五時亦名五味言八教者頓漸祕密不定藏通別圓是名八教頓等四教是化儀如世藥方藏等四教名化法如辨藥味如是等義散在廣文今依大本略録綱要天竺論師興起事凡如來滅後一百年後摩訶提婆謂此云大天出世於雞園興諍論阿育大王敬大天信有教五百羅漢見之悲擊目不言泝恆河去育王大悔吐血一斗然尚五竺學侶煽習有教滅後三百年謂或五百年或六百年或八百年龍樹菩薩出世述空義破有教如來滅後八百年龍猛門人提婆菩薩為彼現神足弘宣空義謂三論宗根元八百年後龍猛菩薩依文殊教以芥子七粒開南天竺鐵塔值金剛薩埵菩薩傳真言教又九百年中慈氏菩薩趣阿僧伽謂此云無著請夜分降中印度説瑜伽莊嚴中邊論等演中道無著菩薩位居初地造攝大乘論世親菩薩位鄰極喜造同釋論并造唯識頌謂法相根元一千一百年中護法菩薩出現此菩薩賢劫一佛也造唯識釋論授玄鑒居士云云天竺佛法漢土來事有日記云過正法一千年入像法經十二年後漢謂凡十三主第三明帝治永平七年甲子謂當日本垂仁天王九十三年也帝夢丈六金人放光王宮來云云後朝公卿喧議相此夢有云天竺佛出世説經彼教可來漢土御夢也云云即遣中將蔡愔秦博士王遵等一十八人往天竺尋佛法爾時值摩騰迦葉竺法蘭謂中天竺沙門也二人沙門即聖教負白馬隨漢使來但三年間佛法與道士教諍論不翻譯無弘通而沙門所持釋尊御舍利現威德登虛空放光説法因沙門佛法貴令稱揚云云永平十年立寺號白馬寺於此寺翻譯弘通爾時所渡經四十二章經小乘也十住斷結經大乘也云云佛法來日本事有日記云天竺佛法渡漢土後經四百八十餘年我朝人王第三十欽明天王治第十三年甲申百濟國聖明王所善光寺如來像並經教渡日本焉又自高麗國僧尼漸來仍佛法日本來事如來滅後一千五百餘年也抑上宮太子誅守屋之逆臣是為弘佛法表捨邪歸正者也諸宗不同事於佛立宗者大日釋迦二佛即顯密兩宗也次菩薩人師等宗起一代經一邊一邊得立種種宗也又付一代教南三北七異義有之玄文第十委舉之往彼見但大論之八宗九宗十宗乃至十六宗不同在之八宗者俱舍宗成實宗律宗謂已上三家小乘法相宗三論宗華嚴宗真言宗天台宗謂已上五家大乘先八宗加禪宗為九宗加淨土宗可為十宗歟乃至加於大念佛宗時宗一向宗日蓮宗雜宗涅槃宗而都合十六宗夫宗門者只是獨一法界妙理也十六俱共終如究焉不二教觀豈不一於何在乎勝劣焉龍樹大師智論云佛法大海以信得入矣然則勝劣者唯在於信不信不爾則十六宗俱違背于祖師之釋歟嗚呼佛之三輪非下凡心思口議也泛示隨機不定局也故開於宗門於此密於彼顯大矣哉大矣哉宗門是非將來次第而為未來末學以於五時八教欲于當之謂焉所以當門則令安見也華嚴宗下尋云華嚴宗者如何義云華嚴宗者謂性空宗也性空有二一者本性宗則即華嚴宗也二者見性宗則即禪宗也且華嚴宗者夫天竺普賢文殊馬鳴龍樹堅慧論師等專弘此經就中天親菩薩造十地論弘通之然而此宗所依華嚴經十地論也尋云震旦弘通者如何答東晉代覺賢三藏譯華嚴經弘之大唐代實又難陀此云喜覺重譯具本廣弘之但此兩人末流相不聞之可尋之爰敷燠杜順帝心尊者隋代講經弘之時人文殊大聖化身歟云云其後至相寺智儼尊者西寺法藏謂大周代清涼山澄觀圭峯宗密定慧尊者次第傳之又禪門寺華嚴和尚立此宗仍名華嚴宗事且依所弘經名且約能弘華嚴和尚名也籤十云言七處八會者是舊經五十卷或六十卷成晉義熙十四年北天竺佛度跋陀羅三藏此翻覺賢於揚洲司空寺譯後有大唐三藏證聖元年來至與于闐實叉難陀此云喜覺於愛敬寺譯八十卷成但龍宮三本上本十三世界微塵數品中本四十九萬八千八百偈下本十萬偈四十八品今但有三十九品則經猶未盡舊經七處八會新譯更加普光明殿一會矣尋云探玄記一云西域相傳龍樹菩薩往龍宮見大不思議解脫經有三本上本十三千大千世界微塵數頌四天下微塵數品矣如何答此相違補注會云或總略歟或品字誤歟仍唐本云十三世界微塵數偈矣有抄云當時將來世流布本下本經也付此譯四本一北天竺三藏佛陀跋陀羅譯梵本三萬六千頌成六十卷者是也二于闐國實叉難陀并譯舊文兼補諸闕總翻四萬五千頌合成八十卷者是也第二第三譯可尋之私謂第二香象所譯六十華嚴第三澄觀所譯八十華嚴歟又云晉覺賢三藏譯此經時青衣童子二人出池中每日致香華供養于闐三藏譯此經時五更之曉香水雨降空苑中忽生百葉蓮華云云尋云西寺法藏大周代也云云而法藏法師唐則天皇后代人也如何答實爾也唐第四主則天皇后聖曆二年己亥十月八日弘福寺法藏奉詔講華嚴經至于世界品講堂及寺地震動不思議瑞相也仍王臣歸之華嚴宗自此興則天皇后治十六年改唐名名大周仍華嚴宗此大周代興也但則天薨御後唐第五主改大周如本名唐代仍今大周法藏者唐與宋中間五代中大周非也唐書本紀第四云哉初元年九月改為周天則天治也開元四年改為則天皇后云云尋云華嚴疏者如何答清涼寺澄觀新八十華嚴翻譯自造疏華嚴大疏是也又付大疏自造末文演義抄是也香象大師付六十華嚴造釋探玄記二十五卷五教章三卷也云云尋云日本傳來者如何答人王第四十六代孝謙天皇治六年勝寶六年甲午年東大寺朗辨僧正奉敕入唐奉值唐廬山慧遠法師傳此宗慧遠者法藏弟子也云云有日記云新羅僧審祥禪師謂住大安寺天平十二年庚辰十月八日依朗辨僧正請於東大寺金鐘道場謂號羂索堂講華嚴經朗辨僧正實忠和尚等定大僧都正進律師長歲和尚道雄僧都基海良緒律師光智大僧都等次第相續傳之光智大僧都於東大寺內立尊勝院為宗本處云云尋云宗教者如何答立五教一漸教謂攝阿含等諸小乘二大乘始教謂攝深密等諸大乘經并瑜伽唯識諸大乘論三大乘終教謂攝涅槃經等四大乘頓教謂無別部經諸大乘中所説以即心是佛無有次位文為頓教謂禪法是也五大乘圓教謂攝華嚴法華分為二謂一別教攝華嚴本會二圓教攝華嚴未會及法華華嚴綱要云依於賢首總攝諸教略有五門一愚法小乘教唯明人空自求出離是則半字大小懸殊二大乘始教謂説五性定分三乘未盡理源故名為始三大乘終教唯説一乘無有二乘盡理之談故名終教四頓教一念不生即名為佛不依行位漸次而修故思益云得諸法正性者不從一地至於一地可離毀相泯心心生即妄不生即佛亦無佛無不佛無生無不生如淨明鏡住顯不二等則其類也五圓教一位即一切位一修一切修十信滿心即攝五位頓成正覺普賢法界帝網重重故名為圓矣尋云宗旨者如何答事事無礙為宗旨也真言天台等約事理不二談無礙相即不能事獨相即吾家華嚴意九世相入云三世九世事法現前相即初後無礙也抑唐則天皇后代香象大師應則天請於師子殿講華嚴經彼殿有金師子此師子為譬五教十玄六相釋出金師子章云香象大師釋也尋云金師子章十門者如何答十住心論九云金師子章云釋此金師子一章略作十門分別一明緣起二辨色空三佛三性四顯無相五説無生六論五教七勤十玄八括六相九成菩提十入涅槃矣尋云十門中第七十玄者如何答十住心論九云七勤十玄者一此金與師子同時成立圓滿具足名同時具足相應門第二金與師子相容成立一多無礙於中理事諸相各各不同或一或多各住自位名一多相容不同門第三若看師子即唯師子無金即金隱師子顯若看金即唯金無師子即金顯師子隱若兩處看即俱顯俱隱隱即祕密顯即名顯著故名祕密隱顯俱成門第四即此師子根本耳支節一一毛處各各金收師子一一能所師子同時頓入莖毛中一一莖毛中各各皆有無邊重重無盡無盡如帝網天珠名因陀羅網境界門第五此師子眼收師子盡即一切純是眼若耳收師子盡即一切純是耳若諸相同時相收悉皆具足即一一皆純皆雜又一一皆是圓滿藏故受諸藏純雜具德門第六師子諸根一一毛頭皆各金收師子盡一一皆徹遍師子耳即眼眼即鼻自在成立無障礙故故名諸法相即自在門第七此師子或隱或顯若一若多定純定雜有力無力即此即彼主伴光輝理事齊現皆盡相容不礙安立微細定辨故名微細相容安立門第八此師子是有為法念念生滅剎那無間進為三際為過去現在未來此三際各有過去現在未來總三三位以立九世即更束為一數法門雖復九世十世各各有融隔不同相由成立通融無礙相同為一念故名十世隔法異成門第九即此師子與金或隱或顯或一或多無有自性由心回轉説事説理有成有立故名唯心回轉善成門第十説此師子用表無明宅此金體具彰真性二事合説況阿賴耶識金生正解名為宅事顯法生解門矣尋云華嚴宗抄云十玄者一同時具足相應門金與師子同時成立二廣狹自在無礙門須彌芥子相入如三一多相容不同門金與師子目容一多無礙四諸法相即自在門五祕密隱顯俱成門見金方師子隱見師子方金隱六微細相容安立門七因陀羅網境界門八宅考宅恐託歟事顯法生解門九十世隔法異成門十主伴圓滿具德門云云相違如何華嚴經疏序云一十身歷然而相作六位不亂更收二廣大即入於無間塵毛色細而無外三炳然現猶得花瓶四具足同時方之海滴五一多無礙如虛空之千光六隱顯俱成似譯空之片月轉七重重交映若帝網之垂珠八念念圓融頓多夢夢經年九法門重疊若空起長空十萬行花披法華開綿上矣請學者十住心論華嚴疏相違事如善財可決明師云云尋云四種法界者如何答綱要云法界無邊略有其四一事法界謂色因果心萬像歷然即以緣起分而為其相二理法界色即是空空相亦絶即以無相而為其相三事理無礙法界色即是空空即是色事理交徹即以互融相成隱相顯自在而為其相四事事無礙法界以性融相相如性融即以一多涉入交映重重而為其相矣尋云付第五圓教立別教一乘同教一乘者如何答別教者非天台所立第三別教報身居報土對地住已上菩薩説圓融不思議法門二乘劣機更不可及之是故名別教也先照高山華嚴厚殖善根正機也是別教義也依之五教章云此別教一乘別於彼三乘矣同教者上同別教明圓融義故也下同三乘欲令二乘成佛故也是則法華開三顯一是也澄觀釋云即大同天台但加頓教矣尋云華嚴法華同異者如何答華嚴名稱性本教三世常住圓滿頓教是本教也法華名逐機末教法華逐二乘劣機令得脫但其功令歸華嚴也依之能入法華所入華嚴釋譬國王高位自下手不至合戰臣下等侍武士等能降伏強敵如也然其功終令歸大將也仍法華諸法歸實相一理説此實相即華嚴也於一佛乘云華嚴也是此開方便門云迄法華得分也示真實相重華嚴也仍法華實相能入門也依之清涼釋云所入一乘即是華嚴矣香象釋云謂諸二乘以根鈍故要先回入共教大乘捨二乘名得菩薩稱然後方入此普賢法矣又一切衆生成佛皆依華嚴也離華嚴成佛事無之依之清涼師釋云離此普法更無餘路得成佛故矣但諸經論中明衆生成佛相事只是能引分也終歸華嚴根本也云云尋云性起緣起不同者如何答釋云性起唯淨法緣起通染淨矣唯真如法性起成諸法處性起云也性海無風金波自涌云是也緣起者真妄和合起諸法也云云尋云性起者果分體歟答性起云性起法門沙汰事尚因分可説法門內也果分者總不出言説也尋云因分可説果分不可説者如何答十地論云因分可説果分不可説矣但華嚴經加四菩薩令説之非佛説故果分不可説云歟覺僧祇品隨好品佛説非果分可説相也十地論云我但説一分矣是因分一分也五教章云問若不説果分何不思議品等説果分耶問答之時取此果分令成因行故形對因人故此釋矣意因人聞果可成因行故且説之也形對因人者普賢文殊等加令説之云事也非不思議果云事也尋云華嚴明性具耶答四明釋云性起云不云性具云云真如法性理萬法緣起談彼理內性具諸法云事不云也難云若爾者三論宗真如隨緣有何不同耶答三論真如萬法遍明真如成萬法不云也華嚴性起法性萬法出生云也是此隨緣真如相分明也不云性具方華嚴劣也天台勝也四明智禮釋云他家不明修性若以真如一理名性隨緣差別為修故知他宗極圓祇云性起不云性具又不談性具百界但論變造諸法何名無作耶矣尋云華嚴五重法義者如何答一者一心門二者二門謂真如門生滅門三者覺不覺謂生滅之內法性無明四者三細謂第八識五者六粗謂六識尋云天台一念三千華嚴事事無礙同異者如何答華嚴師意彼宗人華嚴十十無盡法門無齊限天台限一念三千故有齊限劣也云云天台意十十無盡法門性起分非性具是此不可及三千互具法門其上天台云彼彼三千互遍亦爾矣實三千者非取數量三千者法界異名也言法界者須云十界云云華嚴之祖師欲勝於事事無礙台家之祖師欲勝於一念三千互欲建立於宗門故於此性起於彼性具大矣哉兩祖師於法得最自在住首楞嚴能建大義親靈山聽衆廣學內外經書通達大小教門故和光同塵之本願結緣始其何毒醉迷亂之我等無便于授藥但兩祖師念我受苦徹骨髓恆欲利益猶如一子其利益何事乎所謂道心是也世間淺近益皆為此方便也夫獨一法界於何在乎勝劣焉龍樹智論云佛法大海以信得入矣然則勝劣者在於信不信不爾則兩宗俱共違背于祖師之釋歟禪宗下尋云華嚴五教事付之禪法教外別傳談何第四頓教攝禪門耶既云教何無教宗門可云耶答彼宗無教者只是晴證誤無教云也達磨心印又教云意有之故亦號佛心宗夫達磨和尚南天竺大波羅國香思大王第三王子也發菩提心出家東來震旦初在梁武帝信之後移魏梁三魏六年合九年端坐面壁所得心印是名教外別傳法二祖慧可來雪峰求法七日七夜不眴目慧可雪付頸敢不傷之七日七夜後折一臂投師前其時師授法即得法畢達磨付法偈云吾本來兹土傳法救迷情一華開五葉結果自然成矣二祖慧可得解偈云本來緣有地因地種華生本來無有種華亦不能生矣二祖元是癩人也得法畢一臂復本通身相好具足抑初祖造三部論謂破相論悟性論血脈論也悟性論云直指人心見性成佛教外別傳不立文字矣尋云教外別傳依經者如何答楞伽經云我從得道夜至涅槃夜不説一字矣大梵天王問佛決疑經云佛告大迦葉言吾有正法眼藏涅槃妙心實相無相微妙解脫法門付屬摩訶迦葉汝當諦聽吾偈法本法無法無法法亦法今付無法時法法何曾法矣是則佛於靈山會上捧一枝蓮華示四衆四衆不知之迦葉破顏微笑領解佛旨是故此時以心一法付迦葉畢以心傳心是也云云尋云禪法有三機者如何答上根向上機也向上一路先聖不傳云云不落義味不見思量本來本是機也云云中根以公案得法公案者唐土習在家出家應敕步行人皆付敕案也庭前柏樹枝狗子無佛性云公案一句肝銘敕案付人何軍陳等中行人如不指手妄念不引落形也但付公案機又重重不同可有之下根佛説經論所説禪定開悟者是也仍上中二根名祖師禪達磨所行心印故也下根名如來禪例如天台依經立行云云尋云向上有機耶答先聖不傳云云所彼機不可有之歟但東福寺聖一和尚向上有機云云建仁寺葉上向上無機云云可尋之彼聖一坊唐土佛感考惑恐鑑歟禪師弟子也佛感考惑恐鑑歟有三人得者唐土二人日本一人今聖一和尚是也夫相承傳來大覺世尊二十四師子尊者二十五婆舍斯多二十六不如密多二十七般若多羅二十八菩提達磨二祖北齊慧可三祖鑒智僧璨四祖雙峰山道信五祖黃梅山弘忍神秀北宗元祖唐大通華嚴寺普寂大光福寺道璿大日本國大安寺行表和尚六祖大鑒慧能南宗元祖南嶽懹讓洪洲宗元祖馬祖道一百丈懹海黃檗希運臨濟義玄臨濟宗根元溈山靈祐慧寂溈仰宗元祖光像私云宗派不見荷澤神會荷澤宗元祖青原山行思希遷私云此問雖有弘道藥山宗派不見故除之惟儼曇晟洞山良價曹山本寂曹洞宗根元道悟崇信德山宣鑒雪峰義存雲門文偃雲門宗根元玄沙宗一桂探清涼文益禪師號大法眼禪師法眼宗根元永嘉真覺禪法五流者一牛頭宗出自四祖下法融為始二北宗出自五祖下神秀為始三南宗出自五祖下慧能為始四荷澤宗出自六祖下神會為始五洪洲宗南丘懷讓為始南宗下分五葉一臨濟宗二溈仰宗三曹洞宗四雲門宗五法眼宗義云山家大師於我朝者稟禪法於大安寺行表和尚又稟道璿入唐後對禪林寺倏然禪師受之達磨付法牛頭山法門等傳之安睿山云云又有鈔於大唐值神秀稟禪法云云可尋之何北宗法流也云云又日本鷲峯由良覺心禪師入宋謁黃龍無門禪師又東福寺圓爾和尚入宋遇徑山無隼考隼恐準和尚師範傳此法畢是皆臨濟宗餘流也又建仁寺榮西入宋謁東林虛室考室恐菴歟懷敏考敏恐敞歟傳此法畢次越前國永平寺開山佛法禪師入宋稟承曹洞宗歸朝後立永平寺安置之于今門流相續云云尋云慈覺禪法受學者如何答入唐時值俗人傳此宗姓蕭名仲慶云云赤山大明神於唐土禪法守護神也大師隨從日本來給則西坂本赤山傍立禪院云云恐本朝禪院最初歟覺大師傳記云下舶登當洲赤山法華院送過冬月明年開成五年春大師祈願海會諸尊當處山神必施冥助令遂本願若適歸本國當建立禪院弘傳法門資益山神此山盛傳禪法故發此願矣七佛偈者禪經出云云毗婆尸佛頌曰身從無相中受生猶如幻出諸形像幻人心識本來無罪福皆空無所住矣尸棄佛頌曰起諸善業本是幻造諸惡業亦是幻身如聚沫心如風幻出無根無實性矣毗舍浮佛頌曰假借四大以為身心本無性因境有前境若無心亦無罪福如幻起亦滅矣拘留孫佛頌曰見身無實是佛見了心如幻是佛了了得身心本性空斯人與佛何殊別矣㸸那含佛頌曰佛不見身知是佛若實有知別無佛智者能知罪性空坦然不懼於生死矣迦葉佛頌曰一切衆生性清淨從本無生無可滅即此身心是幻生幻化之中無罪福矣釋迦佛頌曰幻化無因亦無生皆即自然見如是諸法無非自他生幻化無生無所畏矣摩訶迦葉偈曰法法本來法無法無非法何於一法中有法有不法矣阿難偈曰本來附有法附了言無法各各既自除除了無無法矣菩提達磨偈曰吾本來兹土傳法救迷情一華開五葉結果自然成矣尋云禪法所立理致機關二門者如何答理致向上宗風也機關利萬機云云但神智云宗門立理致機關二門教化機緣其理致者但是般若所説畢竟皆空不同天台一念三千三諦之觀其機關者提撕公案而守之提公案有二義一云致心識分別而守公案二云於公而生疑心若念起舉公案而疑公案何故是公案而是佛法大體兮國請寺百録天台相釋時又與禪衆則一百餘僧請智者大師矣二祖慧可大師禪僧一百餘人談話請智者於禪法決之云云貴哉慧可老和尚無我三昧看看無一字莫言不説道風吹非下凡心思口議也泛示隨機不定局也尋云天台禪法同異者如何答宗教有不同事勿論也自元各別宗故也立行不同光考光恐廣歟燈録云天台説止觀時達磨現空中問云汝何數文字不談實理天台答云汝愚不知文字性離矣觀門內證不明兩宗深致暗以難評判事也傳燈録云達磨大師教外別傳之昔正是智者禪師一心三觀一心三觀一心三觀考一心三觀四字恐衍正是達磨大師教外別傳而有同異智者以教示之達磨以禪示之其理不二也矣然則於何在乎勝劣焉龍樹智論云佛法大海以信得考得智作能入矣然則勝劣者在於信不信不爾則俱共違背于祖師釋歟又華嚴五教第四列禪法頓教華嚴下列之云云其時第一頓教者所謂第一頓教下依章顯示文為二初明五時五味及化儀四教二初正明文為三初四時化儀二初正示四初頓教文分三初標二指經三解釋今八教之始故云第一即華嚴經也從部時味等得名為頓所謂如來初成正覺在寂滅道場四十一位法身大士及宿世根熟天龍八部一時圍繞如雲籠月爾時如來現盧舍那身説圓滿修多羅故言頓教若約機約教未免兼權所謂若約機下點示化儀頓中具化法文為二初約機教總辨兼權言機教者所説教法雖然廣大猶有教道未融者也所化之機雖是大士猶有歷別不圓者也今止觀宗豈欲貶挫普賢普眼三無差別初住圓融者乎但據歷別未融判兼權耳謂初發心時便成正覺等文為圓機説圓教所謂謂初下雙示能所文為二初示能兼之圓初發心者初住位中開發本性三因成三身也故正因發成法身也了因發成報身也緣因發成應身也是八相果非妙覺也具如下辨言等文者略如向引三無差等如此等文即是為圓機説圓法也文句記云華嚴起信彰灼明文八相成道故知初住破無明惑成八相果名為分證其唯天台非關他矣處處説行布次第則為權機説別教所謂處處下示所兼之別言處處者總指華嚴其中處處又亦可云七處故也言行布者行謂行列布謂布措布置陳列次第之義耳此則為權機説別教也應知經意兼含義難定判始從住前至登住來全是圓義從第二住至第七住文相次第又似別義於七住中又辨相即至行向地又是差別次第之義又一一位皆有普賢行布二門故知兼用圓接別也若乃善財於諸知識但解一法未解餘法此定屬別教若不爾者何有圓人只知一法不解餘法耶清涼觀師謂天台宗判兼別教失華嚴意乃自立義云行布即是圓融之行布善財參諸知識但解一法謂之謙己推勝又以諸知識對當位次復以華嚴判為頓頓仍以華嚴是菩薩請超勝法華而卻全用天台判教相文及三觀三德一念三千性善性惡等况復賢首圭峰長水等所立義旨各自不同師資撰述何其然哉如欲比校上來是非具如大部補注中説或不辨者則吾祖大訓日就衰微矣學者思之問本性宗次而見性宗來不審所何答本性宗與見性宗説之次第理非次第能照本有之性言語亦非言語能忘逆順之修本性亦非本性如是則豈非無外乎三諦耶一性無性是名為空非直空必即假中豈非不離空假中也故云耳空即是心假是色非色非空名曰中色心絶處中體現於一一法體皆具誠如所問指經是頓也化儀之頓其唯華嚴故專指之若見性宗之依經由依於圓覺等諸大乘經云頓教者乃是化法圓頓之頓又是別教但中之頓是故不同化儀中頓指華嚴也雖爾性具故且今從部時味等得名為頓所以者所何本性宗與見性宗非一故開於宗門於性具非異故今合然而非一非異為以一異體猶尚更照於一異則即是等圓宗謂妙玄曰三諦圓融妙法也矣華嚴經中云譬如日出先照高山謂第一時涅槃云譬如從牛出乳此從佛出十二部經謂一乳味法華信解品云即遣傍人急追將還窮子驚愕稱怨大喚等此領何義答諸聲聞在座如聾若啞等是也所謂華嚴初分永無聲聞若至後分則有聲聞雖有在座如聾若啞不入其手非其境界故云云亦復金剛經云若以色見我以音聲求我是人行邪道不能見如來或應無所住而生其心矣又云三世之心皆不可得矣依圓覺經楞伽經等説不要誦呪讀經等偏專工夫思惟不抱言語教門是等頓教略明本性宗見性宗之旨竟
