body:
  text: 俱舍宗下尋云俱舍宗者如何答俱舍宗者擇滅空宗也謂擇滅空三一實有四諦宗俱舍宗也二見空得道宗成實宗也三防非止惡宗三或唯律宗也或兼律宗也或摩訶衍律宗且俱舍宗者義云此宗震旦將來玄奘三藏渡天時瑜伽唯識并俱舍論習之將來日本傳來人王第三十六代皇極天皇治七年大化四年戊午年正月七日智通智達二人沙門奉勅乘新羅國船入唐值玄奘受無性義并俱舍宗將來尋云或抄云此宗法相玄昉僧正將來云云如何答有鈔云我朝第四十四代元正天王治九年養老七年癸亥年南都玄昉僧正入唐八年在唐聖武天王治七年天平二年庚申年五千餘卷一切經論將來云云此五千梵篋中俱舍論可有之故玄昉將來云非相違延曆十三年官符云俱舍付法相宗云云尋云此宗弘何事耶答三藏教有門修因感果相談也世親菩薩造俱舍論三十卷也面述薩婆多有部義傍明經部義也唐玄奘譯之令弘通三藏門人光師寶師各作釋同弘之神泰圓暉師又作疏弘之世流布頌疏圓暉法師釋也後學多分用頌疏為俱舍論頌疏者略辯俱舍論頌釋疏全部三十四卷審諦往破見大方婆沙論正理論顯宗論等皆此宗依憑也抑當時東大寺園城寺專學之又山門傍學之云云但小乘宗故一代判教無之略頌曰婆沙二百論三十正理顯宗八四十光寶十五神泰五疏六圓暉頌疏慧慧暉倫各三卷矣成實宗下尋云論主誰人耶又二十部中申何義耶又大乘論云事有之耶答如來滅後九百年呵梨跋摩菩薩此云師子鎧亦云法尚出世先初小乘論師也後歸大乘昔小執愧慚時造成實論以小乘為大方便義申此論十六卷或二十卷二百六品有之梁朝為大乘論至陳隋代天台嘉祥等評判之小乘目錄載給此論通教體空觀相似事多之三假浮虛如幻乾闥婆城等是也然是盜大乘意會也四教義云二十七賢聖具出成論但事相繁多廣說摩訶衍義矣涅槃暹記釋成實論云此約分通大乘以說矣自餘疑在下云云玄一云呵梨跋摩亦用初審四悉檀造成實論通三藏見空得道意也矣要決云呵梨跋摩秦言師子鎧佛涅槃後九百年中於在中天竺考迦旃延斥其偏謬除繁委未莫存歸本造成實論崇附三藏暫目云我今正欲論三藏中實義實義者即空義也問若爾彼論廣明幻夢亦明乾闥婆城喻答此有深意師子論師初習小乘自謂理偽後時廣宗大乘考覈迦旃延斥其偏謬欲釋小乘空義以為方便誘引小根天竺諸國多宗小乘不信大故且依小乘空遂入大乘為梯橙故密示其意故也矣開元錄四云成實論二十卷或二十七卷或十六或十四成實論者佛滅後九百年間訶梨跋摩此云師子鎧之所造也訶梨跋摩本是薩婆多部鳩摩羅陀弟子慨言所譯近在名相問成實之宗正依何義答有人云雖斥排譬宗正用曇無德部有人言偏斥毘曇義專用譬喻真諦三藏言經用部義也矣要集五云此成實論本是數論弟後於經部出家造成實論破有體唯有相故矣舊俱含序云成論依經部矣大乘法相研神章卷第三云元興寺沙門護命述成實宗此論一部二十六卷有二百二品也問此論者二十部中何部所攝耶答諸師多有義然經部攝云是正義也問若然經部建種子此論中有耶答此論可言建立種子問論文中有耶答論第二卷四諦品云入滅者雖無現識而得有識第一卷云生死相續中常隨眾生故名為使等以此等文是有種子問若以此文立種子者何故有師說云此論多聞攝其多聞不立種子耶答多聞部攝不正義也矣尋云震旦將來者如何答東晉第六哀帝治元年隆和元年壬戊年天竺龜兹國羅什三藏自西天七十四部三百八十四卷經論將來其中成論有之弘始十一年為生肇融叡四人弟子三論及成論授畢尋云日本傳來者如何答推古天皇御字聖德元年奉勅道昭道慈二人沙門入唐值玄奘三藏其中道慈受成論將來又此宗大唐僧叡龍光光宅慧影日本百濟道藏法師等弘通之抑延曆十三年官符云成實論付三論宗云云說二十七賢聖明三假浮虛觀門以平等空為所詮云云律宗下凡如來所說大毘尼藏天竺優婆梨尊者一夏九旬間八十度登高座誦之是名八十誦律也天竺毱多三藏傳此律然三藏有五人弟子各各宣一義五部律是也尋云震旦將來者如何答如來滅後一千三百五十一年後秦安帝治八年弘治六年甲辰年罽賓國沙門弗若多羅秦云功德華十誦律五十八卷譯出同十年戊申年佛陀耶舍秦云覺名四分律六十卷譯出云云又有日記曇摩迦羅三藏四分律傳震旦也南山周法師道桓省躬會考會恐慧歟正法寶元表守言元月考月恐解法榮處恆擇梧考梧一作悟允堪擇其元照大智律師事也智夾道標惟一法政法久妙蓮行居當日本弘長文永曆弘通律法云云如此相承云云泉涌寺俊芿法師建曆順德院御宇傳法歸朝畢抑受元照法師義立圓宗戒法依曇無德部四分律而開會之立大乘戒我等長夜持佛淨戒云云始以別受傳之近來依通受門亦弘之云云仍南北所立義門聊有不同歟南都雖用大智律師釋專依瑜伽唯識成其義北京依天台等所立殊立圓宗法門云云聊入門不同歟又南都付古迹談梵網北京付義記談梵網意樂分明哉又南山所立大立化制二教攝教法立有空圓三宗成戒體化制中以制教為本三宗中以圓宗成體薰本藏識成善種子云云尋云律三大部者如何答一戒疏八卷南山釋記八卷大智律師釋釋二百五十戒相貌也是止持疏也本經戒經一卷也說時從得道夜至泥洹夕說之也二業疏八卷南山釋記八卷大智律師釋釋羯磨相貌是作持疏也本經羯磨經三卷也佛說百二十條羯磨相也三行事疏十二卷南山釋立三十篇上中下各四卷合十二卷也又記大智律師一卷或二卷或三卷本不同也又行事鈔依四律五論本七卷七卷抄云也今十二卷也四律者四分律十誦律僧祇律五分律也五論者一毘尼母論二依十誦摩得勒伽論三善見論四薩婆多論五明王論也弘四云復有多伽心雜心事也見母等論矣尋云五部律者如何答如常但經文釋義多不同有之籤四云言五部者彌沙塞曇無德迦葉遺婆鹿富羅薩婆多矣大集經犢子部云云涅槃道暹云婆麤富羅此翻犢子矣五部律者弘决一大集經輔一私志記一同之一曇無德部此云法密亦名法藏部云云法名四分二薩婆多部此云一切有法名十誦三彌沙塞部此云不著有無觀法名五分四東五婆麤富羅部此云犢千部亦云化恒部律本未來五東四迦葉遺部此云重空觀又云飲光部法名解脫此兩戒本相同五分一彌沙塞部涅槃疏十二輔住四同之青色二曇無德部遺教三昧經輔住十四同之赤色三迦葉遺部木蘭四娑婆陀部白色五僧祇律以僧祇部為根本部云云黃色大集經二十云我涅槃後有諸弟子受持如來隱法藏以覆法故名曇摩毱多我涅槃後我諸弟子受持十二部經書說外典凡所問難悉答對是名薩婆多我涅槃後我諸弟子書寫讀誦說無有我及以受者轉諸煩惱猶如死屍是名為迦葉遺部我涅槃後我諸弟子不作地相乃識相是故名為彌沙塞部我涅槃後我諸弟子皆說有我不說空相猶如小兒是故名為婆鹿富羅我涅槃後我諸弟子廣博徧覽五部經典是故名為摩訶僧祇五部雖各別異而不妨諸佛法界矣尋云天台宗相承律法者如何答山家大師云正依法華傍依梵網矣源自多寶塔中相承事起南岳天台乃至道邃和尚云云爰日本桓武天皇治延曆二十四年乙酉傳教大師傳本朝畢抑在唐相承為體者內證佛法譜云大唐貞元二十一年當日本延曆二十四年春三月二日初夜亥時於台洲臨海縣龍興寺西廂極樂院奉請道邃和尚最澄義真等與大唐沙門二十七人俱受圓教菩薩戒矣歸朝後弘仁九年戊戌春始作四條式定大乘戒法法則奏聞嵯峨天皇同十三年六月四日大師遷化畢過一七日後六月十一日任大師遺言光定大師為使節經奏聞之處即下宣旨始被許之即以大師第一弟子前入唐沙門義真和尚為第一戒和尚被始行天台律法畢相續繼踵者也但中古以來儀則似廢爰文永弘安比黑谷慧尋上人再興大乘戒法法門其後傳信和尚後二條院御宇嘉元三年乙巳卜居於黑谷始十二廻之籠山再興此戒儀又慧鎮上人同御宇德治元年丙午同於彼谷始一十二年籠居興此戒法云云仍新院御宇延慶三年庚戌四月於本院神藏寺集疏談戒法云云有抄云一家戒法相承有三相一道禪師註梵網是依天台注之章安大師孫第考第恐弟歟云云二法進僧都註梵網是依天台注之三道邃相承圓頓戒云云山家釋云荷三種文安一山矣可思之其時第二漸教者謂此下三時三味總名為漸次為三乘根性於頓無益故不動寂場而游鹿苑脫舍那珍御之服著丈六弊垢之衣示從兜率降下託磨耶胎住胎出胎納妃生子出家苦行六年已後木菩提樹下以草為座成劣應身初在鹿苑先為五人說四諦十二因緣事六度等教若約時則日照幽谷謂第二時若約味則從乳出酥此從十二部經出九部修多羅謂二酪味信解品云而以方便密遣二人謂聲聞緣覺形色憔悴無威德者汝可詣彼徐語窮子雇汝除糞此領何義答次頓之後說三藏教二十年中常令除糞即破見思煩惱等義也自下明化法四教第一三藏教者一修多羅藏謂四阿含等經二阿毘曇藏謂俱舍婆沙等論三毘尼藏謂五部律此之三藏名通大小今取小乘三藏也大智度論云迦旃延子自以聰明利根於婆沙中明三藏義不讀衍經非大菩薩又法華云貪著小乘三藏學者依此等文故大師稱小乘為三藏教此有三乘根性初聲聞人依生滅四諦教言四諦者一苦諦二十五有依正二報是言二十五有者四洲四惡趣六欲并梵天四禪四空處無想五那含謂四洲四趣成八六欲天并梵王天成十五四禪四空處成二十三無想天及那含天成二十五別則二十五有總則六道生死一地獄道梵語捺洛迦又語泥黎此翻苦具而言地獄者此處在地之下故言地獄謂八寒八熱等大獄各有眷屬其類無數其中受苦者隨其作業各有輕重經劫數等其最重處一日之中八萬四千生死經劫無量作上品五逆十惡者感此道身二畜生道亦云傍正此道徧在諸處披毛戴角鱗甲羽毛四足多足有足無足水陸空行互相吞啖受苦無窮愚癡貪欲作中品五逆十惡者感此道身三餓鬼道梵語闍利哆此道亦徧諸趣有福德者作山林塚廟神無福德者居不淨處不得飲食常受鞭打填河塞海受苦無量諂誑心意作下品五逆十惡感此道身四阿修羅道此翻無酒又無端正又無天或在海岸海底宮殿嚴餝常好鬪戰怕怖無極在因之時懷猜忌心雖行五常欲勝他故作下品十善感此道身五人道四洲不同謂東弗婆提謂壽五百歲南閻浮提謂壽一百歲西衢耶尼謂壽二百五十歲北鬱單越謂壽一千歲命無中夭聖人不出其中即八難之一皆苦樂相間在因之時行五常五戒五常者仁義禮智信五戒者不殺不盜不邪婬不妄語不飲酒行中品十善感此道身六天道二十八天不同謂欲界六天色界十八天無色界四天初欲界六天者一四天王天謂居須彌山半腹二忉利天謂居須彌山頂自有三十三天已上二天單修上品十善得生其中三夜摩天四兜率天五化樂天六他化自在天謂已上四天空居修上品十善兼坐未到定得生其中次色界十八天分為四禪初禪三天謂梵眾梵輔大梵二禪三天謂少光無量光光音三禪三天謂少淨無量淨徧淨四禪九天謂無雲福生廣果已上三天凡夫住處修上品十善坐禪者得生其中無想天外道所居無煩無執善見善現色究竟已上五第三果居處上之九天離欲麤散未出色籠故名色界坐得禪定故得禪名三無色界四天謂空處識處無所有處非想非非想已上四天只有四陰而無色蘊故得名也上來所釋從地獄至非非想天雖然苦樂不同未免生而復死死已還生故名生死此是實有苦諦二集諦者即見思惑又云見修又云四住又云染汙無知又云取相惑又云枝末無明又云通惑又云界內惑雖名不同但見思耳初釋見惑有八十八使所謂一身見二邊見三見取四戒取五邪見謂已上利使六貪七瞋八癡九慢十疑謂已上鈍使此十使歷三界四諦下增減不同成八十八謂欲界苦十使具足集滅各七使除身見邊見戒取道諦八使除身見邊見四諦下合為三十二上二界四諦下餘皆如欲界只於每諦下除瞋使故一界各有二十八二界合為五十六并前三十二合為八十八使也二明思惑者有八十一品謂三界分為九地欲界合為一地四禪四定為八共為九地欲界一地中有九品貪瞋癡慢言九品者上上上中上下中上中中中下下上下中下下上八地各有九品除瞋使故成八十一也上來見思不同總是藏教實有集諦三滅諦者滅前苦集顯偏真理因滅會真滅非真諦四道諦者略則戒定慧廣則三十七道品此三十七合為七科一四念處一觀身不淨謂色蘊二觀受是苦謂受蘊三觀心無常謂識蘊四觀法無我謂想行蘊二四正勤一未生惡令不生二已生惡令滅三未生善令生四已生善令增長三四如意足謂欲念進慧四五根謂信進念定慧五五力謂同上根名六七覺支謂念擇進喜輕安定捨七八正道謂正見正思惟正語正業正精進正定正念正命已上七科即是藏教生滅道諦然如前所列四諦名數通下三教但是隨教廣狹勝劣生滅無生無量無作不同耳故向下名數更不再列然四諦之中分世出世前二諦為世間因果謂苦果集因後二諦為出世間因果謂滅果道因問何故世出世前果後因耶答聲聞根鈍知苦斷集慕果修因是故然也略明藏教修行人之與位初明聲聞位分二初凡二聖凡又二外凡內凡釋外凡中自分三初五停心一多貪眾生不淨觀二多瞋眾生慈悲觀三多散眾生數息觀四愚癡眾生因緣觀五多障眾生念佛觀二別相念處謂如前四念處是二總相念處一觀身不淨受心法皆不淨乃至觀法無我身受心亦無我中間例知謂已上三科名外凡亦名資糧位二明內凡者有四謂煗頂忍世第一謂此四位為內凡亦名加行位又名四善根位上來內凡外凡總名凡位亦名七方便位次明聖位亦分三一見道謂初果二修道謂二三果三無學道謂四果一須陀洹此翻預流此位斷三界八十八使見惑見真諦故名為見道又名聖位二斯陀含此云一來此位斷欲界九品思中斷前六品盡後三品猶在故更一來三阿那含此云不來此位斷欲殘思盡進斷上八地思四阿羅漢此云無學又云無生又云殺賊又云應供此位斷見思俱盡子縛已斷果縛猶在名有餘涅槃若灰身滅智名無餘涅槃又名孤調解脫略明聲聞位竟次明緣覺亦名獨覺值佛出世稟十二因緣教所謂一無明謂煩惱障煩惱道二行謂業障業道此二支屬過去三識謂託胎一分氣息四名色謂名是心色是質五六入謂六根成此胎中六觸謂出胎七受謂領納前境好惡等事從識至受名現在五果八愛謂愛色男女金銀錢物等事九取謂凡見一切境皆生取著心此二未來因皆屬煩惱如過去無明十有謂業已成就是未來因屬業道如過去行十一生謂未來受生事十二老死此是所滅之境與前四諦開合之異耳云何開合謂無明行愛取有此之五支合為集諦餘七支為苦諦也既名異義同何故重說為機宜不同故緣覺之人先觀集諦所謂無明緣行行緣識乃至生緣老死此則生起若滅觀者無明滅則行滅乃至生滅則老死滅因觀十二因緣覺真諦理故言緣覺言獨覺者出無佛世獨宿孤峰觀物變易自覺無生故名獨覺兩名不同行位無別此人斷三界見思與聞聞同更侵習氣故居聲聞上次明菩薩位者從初發心緣四諦境發四弘願修六度行一未度者令度即眾生無邊誓願度此緣苦諦境二未解者令解即煩惱無盡誓願斷此緣集諦境三未安者令安即法門無量誓願學此緣道諦境四未得涅槃者令得涅槃即佛道無上誓願成此緣滅諦境既已發心須行行填願於三阿僧祇劫修六度行百劫種相好言三阿謂無僧祇謂數劫謂時者且約釋迦修菩薩道時論分限者從古釋迦至尸棄佛值七萬五千佛名初阿僧祇從此常離女身及四惡趣常修六度然自不知當作佛若望聲聞位即五停心總別念處謂外凡次從尸棄佛至然燈佛值七萬六千佛名第二阿僧祇此時用七莖蓮華供養布髮掩泥得受記莂號釋迦文爾時自知作佛口未能說若望聲聞位即煗位次從然燈佛至毘婆尸佛值七萬七千佛名第三阿僧祇滿此時自知亦向人說必當作佛自他不疑若望聲聞位即頂位經如許時修六度竟更住百劫種相好因修百福成一相福義多途難可定判有云大千盲人治差為一福等修行六度各有滿時如尸毘王代鴿檀滿普明王捨國尸滿羼提仙人為歌利王割截無恨忍滿大施太子抒海并七日翹足讚弗沙佛進滿尚闍黎鵲巢頂上禪滿劬嬪大臣分閻浮提七分息諍智滿望初聲聞位是下忍位次入補處生兜率託胎出胎出家降魔安坐不動為中忍位次一剎那入上忍位次一剎那入世第一位發真無漏三十四心頓斷見思習氣坐木菩提樹下生草為座成劣應丈六身佛受梵王請三轉法輪度三根性住世八十年現老比丘相薪盡火滅入無餘涅槃者即三藏佛果也上來所釋三人修行證果雖則不同然同斷見思同出三界同證偏真只行三百由旬入化城耳略明小空宗之旨竟
