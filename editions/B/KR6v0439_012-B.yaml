body:
  text: 三論宗下尋云三論宗者如何答三論宗者中宗也謂中宗五一八不中宗者三論宗也二新中宗者日蓮宗也三融通中宗者大念佛宗也四不二中宗者天台宗也五佛性常住宗者涅槃宗且三論宗者如來滅後龍樹菩薩出世宣諸法皆空旨又青辨菩薩出世同宣此旨此宗根元也仍天竺馬鳴龍樹提婆羅睺等弘宣以三部論為依憑故名三論宗也一中論四卷龍樹遣二百論二卷提婆三十二問論一卷龍樹尋云自天竺震旦將來者如何答龜兹國羅什三藏年始十六先屬沙車王子稟學佛滅一千二百八十五年云云其後更遊五竺久學還龜茲如來滅後一千三百九年東晉第六代哀帝治元年隆和元年壬戌年羅什從西天七十四部三百八十四卷經論將來哀帝貴之於長安城經論令譯出云云有日記云什公齡六十三東晉第九主孝武世來涼州其後經十九年到姚秦之朝乃弘始三年齡八十一譯經論而門從三千人達者七十八宿也殊有四人上足謂僧叡僧肇道融道生也弘始十一年為四子授龍樹所造中論十二問考問恐門論并提婆所造百論又傳成實論畢道生大師曇濟大師道朗僧詮法朗大師興皇寺吉藏大師嘉祥寺等次第相傳又道融僧詮吉藏相傳云爰嘉祥大師造三論疏并製作法華疏此門下智凱智命智實寂師慧遠等有之各學之尋云日本傳來者如來答我朝佛法來事人王第三十五代推古天皇治六年戊午高麗國僧慧悲百濟國僧慧聰日本來入時聖德太子崇之立元興寺令安住以慧慈仰師匠學佛法給此慧慈值吉藏習此宗云抑西天佛法渡漢土後經三百年佛法至百濟經一年後日本來其後經四十三年孝德天皇御宇乙酉天下大旱魃高麗慧悲奉勅講三論法門忽降甘雨即時任僧正居元興寺弘通此宗其後福亮僧正智藏僧正次第傳之又智藏下道慈律師智光禮光有之又人王三十五代推古天皇治三十三年聖德元年乙酉奉勅道昭道慈二人入唐值玄奘傳此宗大方雖學六宗以三論為本善識考識恐議勤操僧正安澄寺同受道慈云云是等皆住大安寺又智光下有靈叡法師其後藥寶願曉聖寶等傳之聖寶僧正殊於東大寺弘之即立東南院為宗本處永觀律師明徧僧都等皆是此宗名學者也云云尋云宗教者如何答立二藏三轉法輪二藏者一聲聞藏攝諸部小乘二菩薩藏攝諸部大乘云云三轉法輪者一根本法輪攝華嚴二枝未法輪阿含方等三攝末歸本法輪法華涅槃云云吾宗於般若上立之云云尋云宗旨者如何答諸法不著為宗旨也是此立八不中道破諸宗邪執後別不立我義也破執處宗旨也又別立自義取捨可落故還非佛法正意取又執情也破不可取云也依之嘉祥釋云一切言語皆是假故一切言語皆是假名矣又云言而無當破而不取矣又云橫破八迷竪窮五句矣八迷者八不事也五句者一生二不生三亦生亦不生四非生非不生五非非生非非不生也云云尋云八不中道者如何答止六云橫門者如中論八不不生不滅不常不斷不一不異不來不去一論明八門諸經論則無量矣決六云論第一歸敬序云不生亦不滅不常亦不斷不一亦不異不來亦不去能說是因緣善滅諸戲論我稽首禮佛諸法中第一矣又云本業瓔珞下卷大經大論第六明破諸法竝列八不與中論同矣尋云破而不取事經論見耶答淨名經云善哉善哉不二法門善哉善哉不二法體矣文殊問淨名疾淨名默然此默然文殊善哉善哉稱歎釋摩訶衍論云如言說如淨名如耳聽如文殊矣尋云此宗意一代說教八宗教法如何可得心耶答轉勢說法用一門云也意真實法體無言語眾生利益時且設教法也法相三乘真實一乘方便天台三乘方便一乘真實皆為一機用一門意也但諸宗用一門名相皆真實思是最悞也適化一門邊一分也我宗非三非一為本別不取體也云云尋云不立一法為宗云云何用三論耶答實事我宗不立宗也且適化用一門時立宗也此旨申論故且為依憑計也尋云法相三論勝劣者如何答昔以法相為上但應和宗論時法相真如不徧諸法云三論真如徧諸法云云仍以三論被置法相上畢尋云三論明真如緣起歟答真如全體成諸法不云然理無所存法徧諸法談故一分似真如緣起歟但真如性具法成諸法不云又緣起萬法全體真如不云只是真如無礙法故徧諸法云計也然能徧所徧各別一體相即不云也樂天言云無心水隨器方圓云云三論意水性無所存入方器成方水入圓器成圓水也是此水方圓器體一不云也天台意水自元方圓性有之水器自元體一也云也尋云真如體徧諸法歟將性徧歟答性徧也非體徧仍五大院三論別教四門中空門分釋若爾者豈真如體徧可云耶尋云三論宗三乘教歟一乘教歟答法華譬喻品取三車四車諍有之法相三論羊鹿牛三車也大車者三車中牛車也云云華嚴天台依三車方便得一實大車故前後合為四車也天台意大車能開三車所開也所開三乘會為一實大車云故一乘教也三論一乘三乘用一門方不捨之是此尚三乘脇狹意有之故三乘教也云云又嘉祥釋八證六文云事有之謂法華經中三車見文八處有之是八證也四車見文六處有之是六文也所謂三車方其義親云也尋云三論宗四種釋者如何答一依名釋謂有有無無其任得心也二因緣釋者有必依無無必依有立云也三顯道釋者法華云是法不可示言辭相寂滅矣嘉祥釋云無名相中強說名相因此名相悟無名相矣又云名無得物之功物無應名之實矣四無方釋者嘉祥釋云達無礙道有無方用矣即於一物有萬物用云云故中宗初門日蓮宗下釋蓮師安房州長狹郡小湊人貫名重忠之子也母清原氏恆仰朝曦念誦夢日光映胷而娠當本朝八十五代帝後堀河院御宇貞應元年壬午二月十六日誕焉當八十六代四條院御宇天福元年癸巳五月十二日十二歲同國郡內登清澄寺師事道善房號藥王麿當同帝延應元年己亥十月八日十八歲薙染名是性字蓮長後自改日蓮學真言於道善房兮祈智慧於虛空藏像三七日夢六十有餘耆宿右手擎如明星大寶珠授吾自後聞一知十或云夢當堂後門老僧來取本尊所持寶珠與爾所祈之智慧不言訖投玉逕通胷入左袂其後志遊學而擔登於千里欲修練而負笈於諸藍先於鎌倉學淨土宗又回諸國習律宗次學禪宗其後北嶺園城學聚螢南都高野文室映雪以三餘兮學群經歷一紀兮闚諸宗焉雖歲月積功強疑日夜勵力潭思猶以疑氷難消朦霧未散故入于經藏檢閱諸經論立不惜身命之誓願三十二歲八十八代後深草院御宇自建長五年癸丑三月二十二日夜一七日入室內不出同二十八日向朝日合掌嗚呼四十餘年未顯真實矣始自唱南無妙法蓮華經七字是即宗旨建立之發軫經王流布之濫觴也尋云宗旨者如何答爾時世尊欲重宣此義而說偈言自我得佛來所經諸劫數無量百千萬億載阿僧祇常說法教化無數億眾生令入於佛道爾來無量劫為度眾生故方便現涅槃而實不滅度常住此說法我常住於此以諸神通力令顛倒眾生雖近而不見眾見我滅度廣供養舍利咸皆懷戀慕而生渴仰心眾生既信伏質直意柔軟一心欲見佛不自惜身命時我及眾僧俱出靈鷲山我時語眾生常在此不滅以方便力故現有滅不滅餘國有眾生恭敬信樂者我復於彼中為說無上法汝等不聞此但謂我滅度我見諸眾生沒在於苦海故不為現身令其生渴仰因其心戀慕乃出然說法神通力如是於阿僧祇劫常在靈鷲山及餘諸住處眾生見劫盡大火所燒時我此土安穩天人常充滿園林諸堂闍種種寶莊嚴實樹多華果眾生所遊樂諸天擊天鼓常作眾伎樂雨曼陀羅華散佛及大眾我淨土不毀而眾見燒盡憂怖諸苦惱如是悉充滿是諸罪眾生以惡業因緣過阿僧祇劫不聞三寶名諸有修功德柔和質直者則皆見我身在此而說法或時為此眾說佛壽無量久乃見佛者為說佛難值我智力如是慧光照無量壽命無數劫久修業所得汝等有智者勿於此生疑當斷令永盡佛語實不虛如醫善方便為治狂子故實在而言死無能說虛妄我亦為世父救諸苦患者為凡夫顛倒實在而言滅以常見我故而生憍恣心放逸著五欲墮於惡道中我常知眾生行道不行道隨應所可度為說種種法每自作是心以何令眾生得入無上道速成就佛身爾時大會聞佛說壽命劫數長遠如是無量無邊阿僧祇眾生得大饒益若復有人以七寶滿三千大千世界供養於佛及大菩薩辟支佛阿羅漢是人所得功德不如受持此法華經乃至一四句偈其福最多宿王華譬如一切川流江河諸水之中海為第一此法華經亦復如是於諸如來所說經中最為深大又如土山黑山小鐵圍山大鐵圍山及十寶山眾山之中須彌山為第一此法華經亦復如是於諸經中最為其上又如眾星之中月天子最為第一此法華經亦復如是於千萬億種諸經法中最為照明又如日天子能除諸闇此經亦復如是能破一切不善之闇又如諸小王中轉輪聖王最為第一此經亦復如是於眾經中最為其尊又如帝釋於三十三天中王此經亦復如是諸經中王又如大梵天王一切眾生之父此經亦復如是一切賢聖學無學及發菩薩心者之父又如一切凡夫人中須陀洹斯陀含阿那含阿羅漢辟支佛為第一此經亦復如是一切如來所說若菩薩所說若聲聞所說諸經法中最為第一有能受持是經典者亦復如是於一切眾生中亦為第一一切聲聞辟支佛中菩薩為第一此經亦復如是於一切諸經法中最為第一如佛為諸法王此經亦復如是諸經中王宿王華此經能救一切眾生者此經能令一切眾生離諸苦惱此經能大饒益一切眾生充滿其願如清涼池能滿一切諸渴乏者如寒者得火如裸者得衣如商人得主如子得母如渡得船如病得醫如暗得燈如貧得寶如民得王如賈客得海如炬除暗此法華經亦復如是能令眾生離一切苦一切病痛能解一切生死之縛兮同年自房洲移于鎌倉名越松葉谷栖草庵每日入于名越山中高聲唱妙法首題當弘長元年辛酉五月十二日四十歲謫于豆洲伊東浦諸餘弟子皆不相伴唯日朗一人隨從等異迹甚多不遑備載往蓮家而尋今略焉當文永十一年甲戌五月十二日欲入山林出鎌倉入于甲斐國波木井卿六月十七日初結草庵於身延山兮交聲於解脫之床幽谷汲水而擔真性月深山拾薪而負孫康雪夕窓風寒忍辱為衣曉爐煙纖法喜為食終日一乘論談之語聞山中所止之處緇白成市施利如雲見形聞聲之輩皆作遭佛想山棲九年齡六十一晝夜讀誦妙法華經相同靈鷲山朝暮講談止觀不異台嶺焉弘安五年壬午九月八日出身延澤十八日入于武藏國荏原郡池上十月八日上足定于六人所謂日昭日朗日興日向日頂日持矣十三日辰尅誦方便品頭北面西而寂滅年歲六十有一歸命頂禮日蓮師妙法注雨潤十方上行餘風吹來際一味寂光共成佛大念佛宗下釋良忍尾洲富田人也登叡山聞台教於良賀稟密灌于永意承德之始隱棲大原山創來迎院夷基趾作結界法鬼魅相語曰師之法力雖驅逐我等法末之時我等當又歸止時忍親聞焉待賢皇后宮人有問道於忍者常常來院一日未通謁先憇殿陛自思言我是婦人屢入精藍惡少之者恐貽疑謗不利吾師我雖慕道切不亦來矣忍在殿內開扉告曰姉之先思又無妨只願固志於此不亦美乎宮人自兹思忍之不凡就而薙染法名法性忍修八字文殊法庭上大石變為師子廻旋哮吼一日異人來謁言曰師盍唱融通念佛乎忍曰何謂對曰廻我所唱融會眾人眾人之唱又通于我是融通念佛也其功踰獨稱不可勝計何以故眾生無邊故師願以此事勸誘四海我又廣唱天神地祇耳忍曰公誰乎對曰鞍馬寺毗沙門天也語已不見忍自此常唱融通念佛又作疏博勸四眾天仁二年來迎院成忍於此地唱顯密又闢聲明梵唄天承二年二月一日丑年六十一忍建一宇度大藏經律論名曰如來藏所持彌陀經時時放光其徒收之置藏中讚曰妙于萬物陰陽不側是世書之所謂神也吾教受佛勅護我法然未聞演出真理之如山王天王之精微矣此方多言有應化之神恐其然乎又是二子精修之感發也或曰融通之說有據乎余曰般若有隨喜一品龍勝菩薩剖祈於智度中化人之言相似同矣大論七云經念無量佛土諸佛三昧常現在前論無量佛土名十方諸佛土念佛三昧名十方三世諸佛常以心眼見如現在前問曰云何為念佛三昧答曰念佛三昧有二種一者聲聞法中於一佛身心眼見滿十方二者菩薩道於無量佛土中念三世十方諸佛以是故言念無量佛土諸佛三昧常現在前問曰如菩薩三昧種種無量何以故讚是菩薩念佛三昧常現在前答曰是菩薩念佛故得入佛道中以是故念佛三昧常現在前夫淨家一向他力念佛也良師心自元自佗不二也生佛一如也非自非佗自他不二上己心彌陀本願淨穢不二上唯心淨土往詣望也凡摩訶止觀常行三昧下附文元意二彌陀可有之附文時意論止觀者念西方阿彌陀佛等云云元意時三諦三觀自受用彌陀步步聲聲念念三業彌陀也云云尋云善導家所談己心彌陀不同如何答彼己心有彌陀云己心彌陀各別也良家意己心即彌陀彌陀即己心只心是一切法一切法是心云云可思之抑煩惱即菩提彌陀業即解脫彌陀苦道即法身彌陀最可明之覺大師十界彌陀釋云云亦次不以南無阿彌陀佛唱唱而觀誰知法界具足法聞思修證無不妙心能觀此體具故若秪觀心不觀具則於一觀分二家一家觀門異諸說諸說雖異觀自一彼迷一心具諸法墮在通別次第中次第而生次第斷豈知十界本來一三千本一亦如是皆非世數可分別妙境元無空假中而亦不離空假中空即是阿假是彌非阿非彌名曰陀色心絕處中體現於一一法體皆具凡夫心具即佛具取著不圓則不具唯一具字顯今宗入此融通宗者甚希有具有能具所具之別能具即是一念所具即是三千所具之中又有能所所通即是三千能通即是有門然此能通所通竝名不思議假豈非兩重能所在一具字中哉是知多門天判其功踰獨稱不可勝計良忍釋又作疏博勸四眾以彌顯由有抗析百家之功雖然二師妙解亦隱於時希有之言有所歸矣嗚呼廻我所唱融會眾人眾人之唱又通于我是融通念佛也天來本尊血脈等今略焉往良家求兮某甲義觀自于今多聞天與良師俱供廣倡法界耳天台宗下尋云天台宗者如何義云此宗隋代天台大師弘法宗故從大師名天台宗云也或法華宗或止觀宗或圓宗尋云只直不云天台宗何加圓字題天台圓宗耶義云為顯此宗振舞也其故四教義一云萬法圓備故名為圓釋圓者不闕為義判三千萬法行者一心一念圓備無闕減圓云也今此宗意只心是一切法一切法是心釋三千一念圓備一心法界遍照一多自在心性本分談故圓宗名也尋云三千一念姿如何義云三千萬法雖事廣不出十界十如性相也然一處釋曰圓融十界居一念微妙也妙法十如即一心難解也矣如此十界十如行者一念圓備阿鼻依正全處極聖自身毘盧身土不逾凡下一念生佛不二凡聖一如三千一念云也問此宗釋尊已來傳法如何答先付法藏經次第可知也大覺世尊一迦葉二阿難三商那和修四毱多五提迦多六彌遮迦七佛陀難提八佛陀密多九脇比丘十富那奢十一馬鳴十二毘羅十三龍樹十四提婆十五羅睺十六僧伽難陀十七僧伽耶奢十八鳩摩羅駄十九闍耶那二十盤駄二十一摩奴羅二十二鶴勒夜那二十三師子尊者義云除釋尊二十三人也第二十三師子尊者檀彌羅王云惡王被害故因茲血脈相傳絕畢爰震旦北齊慧文禪師云人有吾河准獨步呼誰為師若得經佛為師若得論菩薩為師入大經藏燒香散華後手取之釋尊第十三代龍樹菩薩所造中觀論取即開讀之因緣所生法我說即是空亦名為假名亦是中道義文一心三觀開覺以此法附南岳慧思大師南岳附天台智者大師其後章安大師智威大師慧威大師玄朗大師湛然大師次第湛然者謂妙樂妙樂大師弟子道邃道暹智度行滿四人上足有之云云是震旦傳來相也又龍樹天竺須利蘇摩耶菩薩鳩摩羅什次第是此雙林寺傅大士講羅什所譯法華大智度論自然開悟而以法附南岳大師其後天台章安等相承其外直受天台血脈次第有之云云尋云慧文禪師中論相承傅大士法華智論相承共經卷相承非知識相承若爾者師師面授口決相承斷絕應可謂之歟如何答實如所間餘宗如此難也但雖依經卷已得現體證師師一體內證也何況直授南岳直授天台相承師師相承不可斷絕然而日本傳來桓武天皇御宇延曆二十三年最澄和尚奉勅生年三十八歲入唐奉值台州道邃和尚并行滿大師學天台教觀給山家大師釋云所得教迹二百餘卷所決法門七百有餘是皆割煩惱陳金剛之觀智越生死之野牢強目足也矣延曆二十四年乙酉當大唐貞元二十一年秋歸朝同十二月二十六日以所持聖教傳法錄令進覽天皇畢同時所傳密教上顯畢山家大師偈云延曆二十三遂乘第二船得到大唐國同年秋九月二十六日中到台州廓下道邃座主所猶同日晡時到於龍興寺頂禮邃大師同年冬十月月生第七日到佛隴之莊頂禮滿大師以第十二日登佛隴道場五月十九日改乘第一船同年秋七月朔戊辰四日復命平安宮先帝悅求法書寫新教迹凡八百餘卷永納七大寺以為鎮國基為敷揚流布即集六學生令講四教義又聞法華文矣義云山家總四宗兼學也天台真言圓戒達磨法也云云又承和五年戊午六月十三日奉勅慈覺大師圓載圓行常曉瑟運宗叡等六人同時入唐值禮泉寺宗穎僧正傳天台法門又值五臺山慧遠禪師傳一心三觀值福林寺良諝和尚受天台佛法給覺大師傳記云入五臺山有慧遠和尚玄鑒和尚余於一夏中隨逐而被授一心三觀妙義寫得天台教釋等三十七卷於天台大師第八弟子禮泉寺宗穎所研習止觀之徹旨矣經九年同十三年丙寅歸朝云云密宗相傳如上云云又文德天皇治四年仁壽三年癸酉八月九日智證大師奉勅生年四十四歲入唐值天台山林和尚竝越州福林寺良諝和尚受天台教法清和天皇治二年貞觀元年己卯歸朝畢所持聖教一千餘卷也其外密宗傳來有之上書之畢尋云宗教者如何答四教五時教相是也諸宗皆攝之云云尋云宗旨者如何答一心三觀一念三千是也但他宗皆宗旨宗教別立之一家意教觀一如宗體也決一云是故三觀總攝四教矣四教義一云問四教從何起答從三觀起問三觀復因何而起答三觀還因四教而起矣尋云依經者如何答以法華為依經也該於一代文體正意唯歸二經一依法華本迹顯實二依涅槃扶律說常矣但一家疏釋以三大部為本玄義釋首題五字文句於文文句句釋之止觀十章大意五略經大意也嗚呼四十餘年未顯真實妙哉其時說法華開前頓漸會入非頓非漸故言開權顯實又言廢權立實又言會三歸一言權實者名通今昔義意不同謂法華已前權實不同大小相隔如華嚴時一權一實謂圓實別權各不相即大不納小故小雖在座如聾若瘂是故所說法門雖廣大圓滿攝機不盡不暢如來出世本懷所以者何初頓部有一麤謂別教一妙謂圓教一妙則與法華無二無別若是一麤須待法華開會廢了方始稱妙次鹿苑但麤無妙謂藏教次方等三麤謂藏通別一妙謂圓教次般若二麤謂通別一妙謂圓教來至會上總開會廢前四味麤令成一乘妙諸味圓教更不須開本自圓融不待開也但是部內兼但對帶故不及法華淳一無雜獨得妙名良有所以也故文云十方佛土中唯有一乘法無二亦無三謂教一正直捨方便但說無上道謂行一但為菩薩不為小乘謂人一世間相常住謂理一時人未得法華妙旨但見部內有三車窮子化城等譬乃謂不及餘經蓋不知重舉前四時權獨顯大車但付家業唯至寶所故致非謗之咎也約時則日輪當午罄無側影謂第五時約味則從熟酥出醍醐此從摩訶般若出法華謂五醍醐味信解品云聚曾親族即自宣言此實我子我實其父今吾所有皆是子有付與家業窮子歡喜得未曾有此領何義答即般若之後次說法華先已領知庫藏諸物臨命終時直付家業而已譬前轉教皆知法門說法華時開示悟入佛之知見授記作佛而已亦次真空不空非但空圓中圓滿非但中妙境元無空假中而亦不離空假中謂理具三千同一性故呼之以為唯一實相豈非元無空假中也一性無性是名為空空非直空必即假中豈非不離空假中也故云耳空即是心假是色非色非空名曰中色心絕處中體現於一一法體皆具謂空即心者以觀歸四陰也假是色者以境歸色陰也故荊溪云無始色心本是理性妙境妙智而隨妄轉不覺不知今既聞名知陰即是即四陰心而能成觀中體現者由雙遮而現也體皆具者約雙照而言也問指何等法為一一法答指所言色心也心雖空色雖假至論能具莫不歸中故四明云遮乃遮情照則照性邊情已泯二諦皆中中既不偏是故空假各含一切學者思之凡夫心具即佛具取著不圓則不具謂同名無明咸稱常樂只一非生非佛三千故云凡具即佛具也取著等義出於止觀禪定境中簡示能具一念之文彼云言一念者不同世人取著一異定相一念記云此據初心習觀之人恐濫託於妄情境觀是故應須簡示入門若據理論無妄非法界亦何隔於取著妄情由是而知言不具者約不能識三千而言具如義例隨釋中解唯一具字顯今宗入此宗者甚希有謂具有能具所具之別能具即是一念所具即是三千所具之中又有能所所通即是三千能通即是有門然此能通所通竝名不思議假豈非兩重能所在一具字中哉是知荊溪判為唯圓四明釋以彌顯由有抗析百家之功雖然二師妙解亦隱於時希有之言有所歸矣圓名圓妙圓滿圓足圓頓故名圓教也所謂圓伏圓信圓斷圓行圓位圓自在莊嚴圓建立眾生諸大乘經論說佛境界不共三乘位次總屬此教也法華中開示悟入四字對圓教住行向地此四十位華嚴云初發心時便成正覺所有慧身不由他悟清淨妙法身湛然應一切此明圓四十二位維摩經云薝蔔林中不嗅餘香入此室者唯聞諸佛功德之香又云入不二法門般若明最上乘涅槃明一心五行又經云有人入大海浴已用一切諸河之水又婆伽羅龍澍車軸雨唯大海能受餘地不堪又檮萬種香為丸若燒一塵具足眾氣如是等類竝屬圓教今且依法華瓔珞略明位次有八一五品弟子位謂外凡出法華經二十信位謂內凡三十住位謂聖初四十行五十廻向六十地七等覺謂是因位末八妙覺謂是果位也初五品位者一隨喜品經云若聞是經而不毀訾起隨喜心問隨喜何法答妙法妙法者即是心也妙心體具如如意珠心佛及眾生是三無差別此心即空即假即中常境無相常智無緣無緣而緣無非三觀無相而相三諦宛然初心知此慶己慶人故名隨喜內以三觀觀三諦境應可見大道止觀審諦今略外以五悔勤加精進助成理解言五悔者有二一理二事理懺者若欲懺悔者端坐念實相眾罪如霜露慧日能消除即此義也言事懺者晝夜六時三業清淨對於尊像披陳過罪無始已來至于今身凡所造作殺父殺母殺阿羅漢破和合僧出佛身血邪淫偷盜妄語綺語兩舌惡口貪瞋癡等如是五逆十惡及餘一切隨意發露更不覆藏畢故不造新若如是則外障漸除內觀增明如順流舟更加擄棹豈不速疾到於所止修圓行者亦復如是正觀圓理事行相助豈不速至妙覺彼岸莫見此說便謂漸行謂圓頓無如是行謬之甚矣何處天然彌勒自然釋迦若纔聞生死即涅槃煩惱即菩提即心是佛不動使到不加修習便成正覺者十方世界盡是淨土觸向對面無非覺者今雖然即佛此是理即亦是素法身無其莊嚴何關修證者也我等愚輩纔聞即空便廢修行不知即之所由鼠唧鳥空廣在經論尋之思之二勸請者勸請十方諸如來留身久住濟含識三隨喜者隨喜稱讚諸善根四廻向者所有稱讚善盡廻向菩提五發願者若無發心萬事不成故須發心以導前四是為五悔下去諸位直至等覺總用五悔更不再出例此可知二讀誦品者經云何況讀誦受持之者謂內以圓觀更加讀誦如膏助火三說法品者經云若有受持讀誦為佗人說內解轉勝導利前人化功歸己心倍勝前四兼行六度經云況復有人能持是經兼行布施等福德力故倍增觀心五正行六度者經云若人讀誦為佗人說復能持戒等謂自行化佗事理具足觀心無闕轉勝於前不可比喻此五品位圓伏五住煩惱外凡位也與別十信位同次進六根清淨位即是十信初信斷見惑顯真理與藏教初果通教八人見地別教初住齊證位不退也次從二信至七信斷思惑盡與藏通二佛別教七住齊三界苦集斷盡無餘故仁王云十善菩薩發大心長別三界苦輪海解曰十善者各具十善也若別十信即伏而不斷故定屬圓信然圓人本期不斷見思塵沙意在入住斷無明見佛性然譬如冶鐵麤垢先去非本所期意在成器器未成時自然先落雖見先去其人無一念欣心所以者何未遂所期故圓教行人亦復如是雖非本所望自然先落永喜大師云同除四住此處為齊若伏無明三藏則劣即此位也解曰四住者只是見思謂見為一名見一切處住地思惑分三一欲愛住地欲界九品思二色愛住地色界四地各九品思三無色愛住地無色界四地各九品思此之四住三藏佛與六根清淨人同斷故言同除四住言若伏無明三藏則劣者無明即界外障中道之別惑三藏教止論界內通惑無明名字尚不能知況復伏斷故言三藏則劣也次從八信至十信斷界內外塵沙惑盡假觀現前見俗諦理開法眼成道種智行四百由旬與別教八九十住及行向位齊行不退也次入初住斷一品無明證一分三德謂解脫般若法身此之三德不縱不橫如世伊三點若天主三目現身百界八相成道廣濟群生華嚴經云初發心時便成正覺所有慧身不由佗悟清淨妙法身湛然應一切解曰初發心者初住名也便成正覺者成八相佛也是分證果即此教真因謂成妙覺謬之甚矣若如是者二住已去諸位徒施若言重說者佛有煩重之咎雖有位位各攝諸位之言又云發心究竟二不別須知攝之所由細識不二之旨龍女便成正覺諸聲聞人受當來成佛記莂皆是此位成佛之相慧身即般若德了因性開發妙法身即法身德正因性開發應一切即解脫德即緣因性開發如此三身發得本有故言不由佗悟中觀現前開佛眼成一切種智行五百由旬到寶所初居實報無障關土念不退位次從二住至十住各斷一品無明增一分中道與別教十地齊次入初行斷一品無明與別教等覺齊次入二行與別教妙覺齊從三行已去別教之人尚不知名字何況伏斷以別教但破十二品無明故故以我家之真因為汝家之極果只緣教彌權位彌高教彌實位彌下譬如邊方未靜借職則高定爵論勳其位實下故權教雖稱妙覺但是實教中第二行也次從三行已去至十地各斷一品無明增一分中道即斷四十品惑也更破一品無明入等覺位此是一生補處進破一品微細無明入妙覺位永別無明父母究竟登涅槃山頂諸法不生般若不生不生不生名大涅槃以虛空為座成清淨法身居常寂光土即圓教佛相也然圓教位次若不以六即判之則多濫上聖故須六即判位謂一切眾生皆有佛性有佛無佛性相常住又云一色一香無非中道等言總是理即次從善知識及從經卷聞見此言為名字即依教修行為觀行即謂五品位相似解發為相似即謂十信分破分見為分證即謂從初住至等覺智斷圓滿為究竟即謂妙覺位約修行位次從淺至深故名為六約所顯理體位位不二故名為即是故深識六字不生上慢委明即字不生自屈可歸可依思之擇之略明中宗之旨竟涅槃宗下涅槃宗者本朝往昔在之云云雖爾今禁止於國法尚恐故不書焉或曰涅槃宗之寺院竝僧俗等悉改于天台宗故今圓宗附焉其時說大涅槃者有二義一為未熟者更說四教具談佛性令具真常入大涅槃故名捃拾教所謂一為下別釋部教為二初捃拾殘機謂捃居運切亦拾也言未熟者於法華中未能開悟但是結緣故至涅槃更說四教皆悉知常而悟道也故涅槃四名為追說良以法華顯真實相已廢方便今為未熟追說前耳言佛性者一切眾生皆有果人之性也佛性不變即真常矣法華似秋成大穫涅槃如捃拾餘殘耳問法華開顯無不成佛何有未熟五千起去人天被移答法界眾生未益者眾何但五千今雖未悟後必解脫一開之後無所間然豈將殘黨以疑大陳應知五千是增上慢雖不廣聞開三顯一已聞略竟雖非當機亦預結緣雖未現悟亦於涅槃及以滅後而信一乘人自多途法華常頓不可見於未熟餘殘便妨法華開顯者也二為末代鈍根於佛法中起斷滅見夭傷慧命亡失法身說三種權扶一圓實故名扶律談常教所謂留逗末代如來滅後名為末代不悟圓常名為鈍根遂於佛法棄捨毘尼謂如來定入滅度名斷滅見乘戒既緩諸惡莊嚴慧命法身夭傷亡失如來預鑑故演涅槃施設三教之權扶助一乘之實廣明持戒委示真常正助相須乘戒俱急法身嚴顯慧命昭然扶律談常其益大矣夭者中死也問慧命法身常住不滅何故文云亡失夭傷答法體何失但由眾生無聞思修所以流轉眾苦煩惱故知得失在眾生耳非約法也法身既失報應可知三身不顯三障熾然準四念處明贖命教乃是贖於藏通之命別圓自有常住之命故非所論當知念處約真中說今文扶律約偏圓言又荊溪云以在穢土須說贖命為捃拾故扶律說常令久住故兼權明實故涅槃顯扶律說常是贖眾生法身慧命之大寶也佛化既以涅槃贖命末代凡流大乘語者捨而不用豈非逆耶然若論時味與法華同論其部內純雜小異故文云從摩訶般若出大涅槃前法華合此經為第五時也問此經具四教與前方等部具說四教為同為異答名同義異方等中四圓則初後俱知常別則初不知後方知藏通則初後俱不知涅槃中四初後俱知問將五味對五時教其意如何答有二一者但取相生次第所謂牛譬於佛五味譬教乳從牛出酪從乳生二酥醍醐次第不亂故譬五時相生次第所謂故譬下結言相生者大涅槃經第十三云佛告住無垢藏王菩薩譬如從牛出乳從乳出酪從酪出生酥從生酥出熟酥從熟酥出醍醐醍醐最上佛亦如是從佛出十二部經從十二部經出修多羅從修多羅出方等經從方等經出般若波羅從般若波羅出大涅槃天台所立五味相生文在斯矣故前文以乳對華嚴乃至醍醐對法華等但約相生不論濃淡若論濃淡則華嚴大教其味成淡鹿苑小法其味卻濃有此不便取相生耳二者取其濃淡此則取一番下劣根性謂所言取者於涅槃相生之文約義亦可取喻濃淡言一番者即下根也言下劣者不發大心但求小果也天親呼為下劣小乘眾香稱為貪所樂法所謂二乘根性在華嚴座不信不解不變凡情故譬其乳次至鹿苑聞三藏教二乘根性依教修行轉凡成聖故譬轉乳成酪次至方等聞彈斥聲聞慕大耻小得通教益如轉酪成生酥次至般若奉勅轉教心漸通泰得別教益如轉生酥成熟酥次至法華聞三周說法得記作佛如轉熟酥成醐醐此約最鈍根具經五味其次者或經二三四其上達根性初味得入法界實相何必須待法華開會上來已錄五味五時化儀四教化法四教大綱如此所謂上來下結然上所錄五時五味但是當分猶復未明五時互通初後之相案玅玄云若華嚴頓乳別但在初通則至後無量義云次說般若歷劫修行華嚴海空法華會入像法決疑云今日座中無央數眾或見如來入涅槃或見住世一劫或見丈六小身大身報身法身同虛空等如日初出先照高山日若垂沒亦應餘輝峻嶺故蓮華藏世界海通至涅槃之後況前教耶若鹿苑酪教別在第二通亦至後如迦留陀夷於法華中面得授記後因非時而入聚落為俗打殺埋馬糞中後從糞出便入滅度文在涅槃當知酪教亦至於後若方等教別在第三通亦至後方等陀羅尼云先於王城授聲聞記今於舍衛授聲聞記故方等教亦至於後若般若教別在第四通亦至後從得道夜至泥洹夜常說般若故般若教亦至於後若涅槃教別在第五通亦至初從初發心常觀涅槃行道故知涅槃通亦至初若法華教就顯露邊不見在初若約祕密何往不通故身子云我昔從佛聞如是法故知法華密亦無初請學者於諸經論勘考略明結宗之旨竟然依上四教修行時各有方便正修謂二十五方便十乘觀法若教教各明其文稍煩義意雖異名數不別故今總明可以意知言二十五方便者束為五科一具五緣二呵五欲三棄五蓋四調五事五行五法初明五緣者一持戒清淨如經中說依因此戒得生諸禪定及滅苦智慧是故比丘應持淨戒有在家出家大小乘不同二衣食具足衣有三一者如雪山大士隨所得衣蔽形即足不游人間堪忍力成故二者如迦葉等集糞掃衣及但三衣不畜餘長三者多寒國土如來亦許三衣之外畜百一眾具食亦有三一上根大士深山絕世菜根草果隨得資身二常乞食三檀越送食僧中淨食三閑居靜處不作眾事名閑無憒閙處名靜處有三例衣食可知四息諸緣務息生活息人事息工巧技術等五近善知識有三一外護善知識二同行善知識二教授喜知識第二呵五欲一呵色謂男女形貌端嚴脩目高眉丹唇皓齒及世間寶物玄黃朱紫種種妙色等二呵聲謂絲竹環珮之聲及男女歌詠聲等三呵香謂男女身香及世間飲食香等四呵味謂種種飲食肴膳美味等五呵觸謂男女身分柔輭細滑寒時體溫熱時體凉及諸好觸等第三棄五蓋謂貪欲瞋恚睡眠掉悔疑第四調五事謂調心不沈不浮調身不緩不急調息不澁不滑調眠不節不恣調食不飢不飽第五行五法一欲欲離世間一切妄想顛倒欲得一切諸禪定智慧門故二精進堅持禁戒棄於五蓋初中後夜勤行精進故三念念世間欺誑可輕可賤禪定智慧可重可貴四巧慧籌量世間樂禪定智慧樂得失輕重等五一心念慧分明明見世間可患可惡善識禪定智慧功德可尊可貴此二十五法為四教前方便故應須具足若無此方便者世間禪定尚不可得豈況出世妙理乎然前明教既漸頓不同方便亦異依何教修行臨時審量耳次明正修十乘觀法亦四教名同義異今且明圓教餘教例此一觀不思議境謂觀一念心具足無減三千性相百界千如即此之境即空即假即中更不前後廣大圓滿橫竪自在故法華經云其車高廣謂上根正觀此境二真正發菩提心謂依妙境發無作四弘誓願憫己憫佗上求下化故經云又於其上張設幰蓋三善巧安心止觀謂體前妙理常恆寂然名為定寂而常照名為慧故經云安置丹枕謂車內枕四破法偏謂以三觀破三惑三觀一心無惑不破故經云其疾如風五識通塞謂苦集十二因緣六蔽塵沙無明為塞道滅滅因緣智六度一心三觀為通若通須護有塞須破於通起塞能破如所破節節撿挍名識通塞經云安置丹枕謂車外枕六道品調適謂無作道品一一調停隨宜而入經云有大白牛等謂已上五中根七對治助開謂若正道多障圓理不開須修事助謂五停心及六度等經云又多僕從謂此下為下根八知位次謂修行之人免增上慢故九能安忍謂於逆順安然不動策進五品而入六根十無法愛謂莫著十信相似之道須入初住真實之理經云乘是寶乘游於四方謂游四十位直至道場謂玅覺位謹案台教廣本以於五時八教以抄錄本朝諸宗略知如此若委明之者請看法華玄義十卷委判十方三世諸佛說法儀式猶如明鏡及淨名玄義中四卷全判教相自從此下略明諸家判教儀式耳告寶永二乙酉曆初秋於洛陽集之砌京師之藥林道昧妙味俱共分於食而施亦復筆墨等與嗚呼臨欲閣筆得頌更書絕待天真在一家因知念海浩無涯區區宗門終如究不二教觀豈不一智是十乘情十境空為不空假非假若人深達妙中意何怪寂照陞光華
