body:
  text: 淨土宗下尋云淨土宗者如何答淨土宗者假宗也謂假宗三一本假宗淨土宗也二遊假宗遊行宗也三新假宗一向宗且淨土宗者義云天竺馬鳴龍樹乃至護法青辨等皆歸此教云云尋云震旦弘通者如何答廬山慧遠禪師開淨土教門云云又震旦有五祖菩提流支傳譯淨土論一曇鸞大師東魏代遇流支傳觀經二道綽禪師三善導和尚四懷感禪師五少康等次第相承仍曇鸞以下為五祖加流支為六祖云云又唐太宗代慈重法師大智律師等同興此宗云云尋云日本傳來者如何答不知其初云云慈覺大師渡唐時值法道和尚引聲阿彌陀經念佛三昧相傳歸朝給赤山大明神於唐土念佛守護神也覺大師隨身來給四明西坂本安置之云云次天台山西塔北谷內黑谷源空上人謂法然自開大經藏興淨土教門一向專修弘通是盛也門下幸西謂成覺一念義元祖隆寬謂長樂寺多念義元祖證空謂善慧西山長西謂九品寺諸行本願義元祖聖光謂鎮西義元祖有之門徒數千萬上足此五人也又高野明徧僧都出雲路明禪法印等皆行之加之出雲路住心上人謂天台學者生馬良徧考徧恐邇法印謂法相木幡真空上人謂三論真言知足院悟阿上人謂律宗法相是等雖非黑谷門徒皆是淨土修行人也又禪林寺永觀作往生講式慧心先德制往生要集欣求淨土先賢也賀古教信上人謂號阿彌陀丸十念成就人也此人草菴穿西壁直為拜生身之來迎歟尋云依經者如何答淨土三部經竝淨土論也三部經者雙卷經二卷觀無量壽經一卷小阿彌陀經一卷淨土論天親造云云見觀經文阿闍世太子依達多教父頻婆娑羅王七重室內令制極欲戟殺后韋提希夫人以蘇蜜和塗身諸瓔珞中盛蒲桃漿密與大王令食之三七日不死太子聞之生瞋欲殺母爾時月光耆婆大臣語太子云聞毗陀論經說劫初已來惡王殺父一萬八千人也未曾有殺母殺母人斷剎利種不成王位云云爾時太子不殺母云云但母深宮閉令住云云母向耆山禮佛佛宮中影向眉間光變成金臺臺上現十方淨土夫人見之望極樂爾時佛往生極樂相示給是三部經由來也尋云宗教宗旨者如何答宗教立聖道淨土二門八宗聖道門難行自力得道云云吾宗淨土門易行他力往生云云十念成就三尊來迎為宗旨也夫華嚴天台等雖逗上根一機於下劣根機徒不取證像法有教行無證末法有教無行證云云爰念佛一門末代相應易行本願難思妙宗也依之小阿彌陀經六萬恆沙諸佛現長廣舌相證明懷感禪師釋云末法萬年餘經悉滅彌陀一教利物偏存矣何況八萬諸聖教皆是阿彌陀佛矣問彌陀三身中何耶答往生要集云問阿彌陀佛極樂淨土是何身土耶答天台云是應身同居土遠法師云是應身應土綽法師云是報佛報土古舊等相傳皆云化土化身此為大失依大乘同性經云淨土中成佛者悉是報身穢土中成佛者悉是化身又彼經云阿彌陀如來蓮華開敷星王如來龍王如來寶德如來等諸如來清淨佛剎現得道者如是一切皆是報身佛也何者如來化身由如今日踊步健如來魔恐怖如來等矣義云九品往生人皆住前未證位人也其上惡人往生曾非報土度之佛又可應身又以觀音為補處豈非應身傳附和耶答他宗中不許凡夫乘他力入報土故最可云爾也判凡夫乘他力直入報土事者淨土宗意也此宗中全以不立橫竪不同何以他宗意難自宗義由機淺深判土高下與由自他二力判土報化於其會通互雖鉾楯至經論誠文者一向以極樂說報土乎全無屬化淨土明文可思之云云尋云雙卷經五時中何耶答淨土人師釋云法華涅槃二處中間矣但天台心方等部經云也既闍王惡逆時分也法華已前聞又頻婆娑羅王得那含果見兼含經又彈呵相有之矣今教觀不二故觀非空空門則出于假門故於假宗為根元且欲當於般若部之也所以者所何所謂本願故尋云極樂世界有幾樂耶答住生要集欣求淨土下舉十種樂一聖眾來迎樂二蓮華初開樂三身相神通樂四五妙境界樂五快樂不退樂六引攝結緣樂七聖眾俱會樂八見佛聞法樂九隨心供佛樂十增進佛道樂矣尋云彌陀穢土有成道耶答又云大論云阿彌陀佛亦有嚴淨不嚴淨土如釋迦牟尼問何土是耶答極樂世界即是淨土然其穢土未知何處但道綽等諸師以鼓音聲經所說國土為彼穢土如彼經云阿彌陀佛與聲聞俱其國號曰清泰聖王所住其城縱廣十千由旬於中充滿剎利之種阿彌陀如來應正徧知父名月上轉輪聖王其母名殊勝妙顏子名月明奉事弟子名無垢稱智慧第一弟子名曰攬光神足精勤名曰大化爾時魔王名曰無勝有提婆達多名曰寂靜彌陀佛與大比丘六萬人俱矣娑婆極樂中間有懈慢世界西方往生人多墮懈慢界事菩薩處胎經云西方去此炎浮提十二億那由佗有懈慢界國土快樂眾生欲生阿彌陀佛國者皆深著懈慢國土不能前進生阿彌陀佛國億千萬眾時有一人能生阿彌陀佛國矣慧心會之云專行者直往生極樂雜行者生懈慢歟云云謂取意尋云九品徃生者如何答觀經十六想觀者一日想觀觀經云見日欲沒狀如懸鼓既見日已閉目開目皆令明了是為日想名曰初觀矣二水想觀三地想觀四樹想觀五八功德池水想觀六總觀想七華座觀八像想觀九徧觀一切色身想十觀觀世音菩薩真實色身想十一觀大勢至色身想十二普觀想十三雜觀想云云十四五六三觀各分三品為九品往生也上品上生者謂上輩生想名第十四觀經云上品上生者若有眾生願生彼國者發三種心即便往生何等為三一者至誠心二者深心三者廻向發願心具三心者必生彼國復有三種眾生當得往生何等為三一者慈心不殺具諸戒行二者讀誦大乘方等經典三者修行六念廻向發願願生彼國如彈指頃往生彼國生彼國已見佛色身眾相具足見諸菩薩色相具足光明寶林演說妙法聞已即悟無生法忍經須臾間歷事諸佛徧十方界於諸佛前次第授記還到本國得無量百千施羅尼門矣上品中生者經云上品中生者不必受持讀誦方等經典善解義趣於第一義心不驚動深信因果不謗大乘以此功德廻向願求生極樂國如一念頃即生彼國七寶池中此紫金臺如大寶華經宿則開矣上品下生者經云上品下品者亦信因果不謗大乘但發無上道心以此功德廻向願求生極樂國一日一夜蓮華乃開七日之中乃得見佛矣中品上生者謂中輩生想名第十五觀經云中品上生者若有眾生受持五戒持八戒齋修行諸戒不造五逆無眾過患以此善根廻向願求生於西方極樂世界蓮華尋開當華敷時聞眾音聲讚歎四諦應時即得阿羅漢道三明六通具八解脫矣中品中生者經云中品中生者若有眾生若一日一夜受持八戒齋若一日一夜持沙彌戒若一日一夜持具足戒威儀無缺以此功德廻向願求經於七日蓮華乃敷聞法歡喜得須陀洹經半劫已成阿羅漢矣中品下生者經云中品下生者若有善男子善女人孝養父母行世仁慈此人命欲終時經七日遇觀世音及大勢至聞法歡喜經一小劫成阿羅漢矣下品上生者謂下輩生想名第十六觀經云下品上生者或有眾生作眾惡業雖不誹謗方等經典如此愚人多造眾惡無有慚愧命欲終時遇善知識為讚大乘十二部經首題名字以聞如是諸經名故除却千劫極重惡業智者復教合掌叉手稱南無阿彌陀佛稱佛名故除五十億劫生死之罪生寶池中經七七日蓮華乃敷當華敷時大悲觀世音菩薩及大勢至放大光明住其人前為說甚深十二部經聞已信解發無上道心經十小劫具百法明門得入初地矣下品中生者經云下品中生者或有眾生毀犯五戒八戒及具足戒如此愚人偷僧祇物盜現前僧物不淨說法無有慙愧以諸惡業而自莊嚴如此罪人以惡業故應墮地獄命欲終時地獄眾火一時俱至遇善知識以大慈悲為說阿彌陀佛十力威德廣說彼佛光明神力亦讚戒定慧解脫解脫知見此人聞已除八十億劫生死之罪經於六劫蓮華乃敷矣下品下生者經云下品下生者或有眾生作不善業五逆十惡具諸不善如此愚人以惡業故應墮惡道善友告言汝若不能念者應稱無量壽佛如是至心令聲不絕具足十念稱南無阿彌陀佛稱佛名故於念念中除八十億劫生死之罪命終之時見金蓮華猶如日輪住其人前如一念頃即得往生極樂世界於蓮華中滿十二大劫蓮華方開矣尋云何必勸稱名耶答五劫思惟名號功德具足故也余洛東以推扣于無得上人庵室之戶問於宗要上人答曰嗚呼汝法器余八旬有餘枯木唯南無阿彌陀佛南無阿彌陀佛矣依之案之善導和尚極淨土底悟得念佛源之時往生行只念佛一行也悟得給事雙觀經文一向專念彌陀佛名云顯阿彌陀經為令離難離生死南無阿彌陀佛云一法說給觀經定散三福行各別種種區雖說之未來流通阿難付屬之時以彌陀名號付屬之聖教常習為未熟機諸法各別明之時至機熟萬法捨只一法也亦問一心不亂稱名者如何答牡丹花下睡猫心全體在于蝶亦問往生根元者如何答三心具足謂至誠心深心於淨家可尋之一義云一歸此教門名至誠心相續同異不忘名深心也廻向者生死海間善業今皆廻向也尋云觀經三福往生者如何答經云欲生彼國者當修三福一者孝養父母奉事師長慈心不殺修十善業二者受持三歸具足眾戒不犯威儀三者發菩提心深信因果讀誦大乘勸進行者如此三事名為淨業矣尋云雙卷經三輩者如何答經云其有至心願生彼國凡有三輩其上輩者捨家棄欲而作沙門發菩提心一向專念無量壽佛修諸功德願生彼國其中輩者雖不能行作沙門大修功德當發無上菩提之心一向專念無量壽佛其下輩者假使不能作諸功德當發無二菩提之心一向專意乃至十念念無量壽佛願生其國矣尋云天台念佛與淨宗念佛為同乎為異乎答淨土門一向他力念佛也天台心自元自他不二也生佛一如也非自非他自他不二上己心彌陀本願淨穢不二上唯心淨土往詣望也凡摩訶止觀常行三昧下附文元意二彌陀可有之附文時意論止觀者念西方阿彌陀佛等云云元意時三諦三觀自受用彌陀步步聲聲念念三業彌陀也云云尋云善導家所談己心彌陀不同如何答彼己心有彌陀云己心彌陀各別也一家意己心即彌陀彌陀即己心只心是一切法一切法是心云云可思之抑煩惱即菩提彌陀業即解脫彌陀苦道即法身彌陀最可明之覺大師十界彌陀釋云云嗚呼互欲建立於宗門故於此他力於彼自力或自他不二大矣哉兩大師於法得最自在住首楞嚴能建大義親靈山聽眾廣學內外經書通達大小教門故和光同塵之本願結緣始善導大師乃至圓光大師天台大師乃至慈覺大師自他俱共無相之五根五力以於譬喻欲說之離於右手則而莫左手之假名離於左手則而莫右手之假名左右手者謂兼對如此離於自力則而莫他力之假名離於他力則莫自力之假名焉自他力者謂兼對自力他力非一故開於宗門非於性具異故今合於一異為體而照於一異則是等皆圓宗獨一法界則即法界身法界身則即獨一法界然則於何在乎勝劣龍樹智論云佛法大海以信得入矣勝劣者唯有於信不信不爾則兩宗俱共違背于祖師之釋歟尋云五逆謗法往生者如何答一算也無量壽經下云夫一念往生者諸有眾生聞其名號信心歡喜乃至一念至心廻向願生彼國即得往生住不退轉唯除五逆誹謗正法矣同上云夫第十八願十念往生者設我得佛十方眾生至心信樂欲生我國乃至十念若不生者不取正覺唯除五逆誹謗正法矣私云觀經下品下生人五逆十惡具諸不善人也大本不生云云相違最難會歟淨土人師凡十五家異義有之天台觀經疏以二義會給疏云此經明觀故說得生矣慧心釋云今試加釋餘處徧顯往生種類本願唯舉定生之人故云不生不取正覺餘人十念定得往生逆者一念定不能生逆十餘一皆是不定故願唯舉餘人十念餘處兼取逆十餘一此義未決別應思擇問逆者十念何故不定答由宿善有無念力別故又臨終尋常念時別故矣略明本假宗之旨竟遊行宗下厥以至理無名而呼名以顯理真如離念而即念以通如焉若其無念念無生而生則事理具足性相融通即事而真而說實相將言此謂乎況我彌陀以名攝眾生以念達無相蓋是佛願難思之深益事理縱橫之極談者乎彼云不假工夫開覺藏不蹈心地登靈臺誠哉此語以足肝心凡六八弘誓者凡聖通入之津船也六字名號者尊卑到岸之風勢也因茲五逆十惡之重罪稱念預來迎五障三從之女質懸憑頎蓮臺諸佛金言眾典鏡開須懇照鑒撥心頭塵若信行者猶如人中芬陀利若疑慮者猶如無眼無耳人盍怖眾虻憑自卑翅不附鳳翼則蒼天九空大難宜辨雖千引巨石置大航船中則大海萬里惟易今飾佛願一乘之舟而浮生死九界之瀆普運載正乘眾機悉度脫九品寶處令此迷心之群類證彼法性之常樂實是他力不共靈德終窮究竟之妙旨者乎云爾爰有一徧上人者姓源豫州人也河州七郎通廣子息出家最初字名隨緣入宗門後改號如佛又稱知真即圓光大師四代之門人西山善慧三世之弟孫也深觀生死輪回兮求菩提之覺路廣闚權實諸宗兮辨出離之要路然則禪定之星現發心天尸羅之月晶修行地智慧光明速照迷妄之闇慈悲蓮鮮急淨罪障之垢倩測內證匪直也人獨步絕倫之譽不可得稱者乎就中曉弘願深奧而歸他力佗攝之道憑易行本誓而閣自策自勵之行強惡小乘已調之心懃發大乘利他之願然間祈濟度方便於日本之靈社决所願成不於水尾之神明是以宇佐明神者利民方法授以六字名號之持念熊野權現者濟生能引受以六十萬人之生札於是上人信靈驗仰神宣一省禮勸念佛徧隨方弘名號因旃若男若女隨教受化者一一難陳或僧或尼合掌結緣者重重易辨當知凡夫引接之誓願末世相應之念佛於此時彌盛者乎然則利生道普而滿大八洲中津國內猶如草木之靡風濟度海廣而流豐葦原秋津島之外尚似星宿之仰光叛之彙稀於鱗角信之倫鬱於龍鱗嗟呼神感有憑佛應無疑彼月氏如來引機示道直指西方安養此日域尊神叶時撫民教念彌陀名號佛神同體大悲共開安樂之要路本迹一致大慈同顯彌陀之名號真信俉訓者便昇常樂之臺迷疑伊致者尚溺苦海之浪宜商量宜商量抑札文云南無阿彌陀佛决定往生六十萬人付此札文人多不審謂但六十萬人往生自餘人不可往生耶是全不爾今於此事正有深意謂注四句文首字於六十萬人更非局云往生人於六十萬人然云神感亦云勝利故於札面具書四句融通功德令持札入圓滿萬行决定往生例如引戒脈令人持戒德戒體實相名號實相戒號雖異法體是同應知又札文字六八即四十八願所表也又號一徧上人之名乘源依彼文歟互前三句有一徧兩字第四句人中上上合即一徧上人也況五種嘉譽中人中上上人可思之聖頌文曰六字名號一徧法十界依正一徧體萬行離念一徧證人中上上妙好華頌吟調高音韻叵和聖慮境界非凡所測今恐以淨土人綱佗力歸賾試作推解彼論家一法句圓滿事理今一徧法亦以如此萬法雖多所詮不出事理性相隨緣不變真俗二體即此一徧兩字是也名號是呼萬法能詮總名也一徧法即所詮萬法名號一徧言異意同以名詮自性名體不二故即云何一徧兩字即萬法也所謂一理徧事一性徧相一即真體一心一如徧是俗體六凡四聖等也應知又於此四句文前三句明所念法即名號實相法也後一句嘆能念人即念佛行者稱美也六字名號一徧法者六字名號是萬法總名一徧法即名號所具萬法謂一即理徧即事故性相真俗二諦諸法是也云何名號即萬法總名也所謂法藏因位昔時修行萬善萬行攝在名號中彌陀成佛時彼因中萬行即顯十劫正覺佛體佛體所顯萬法名體不離故悉備六字名號故唱六字即行萬法由此呼召趣其自體故應知空師云萬善妙體即名號六字恆沙功德備口稱一行矣又云弘願一稱者萬行之宗致也果號三字者眾德根源也矣經云其有得聞彼佛名號歡喜踊躍乃至一念當知此人為得大利即是具足無上功德矣恩師云諸佛願行成此果名但能念號具包眾德故成大善不廢往生矣故云六字名號一徧法也十界依正一徧體者十界者地獄餓鬼畜生修羅人天聲聞緣覺菩薩佛也依正者依依報即十界所居國土正正報即十界能居眾生也一徧體者一是理性即所具真如徧是事法即隨緣真如隨緣不變併名號具德法體也云何十界依正即名號具德法體也所謂佛本於因位時修顯凡聖不二依正一體真如而攝在名號以讓與眾生眾生稱念則不二一體故名阿彌陀佛言人法者即依報正報彌陀實智一法句前即淨土穢土器界生界併彌陀所具名號法體故云十界依正一徧體也萬行離念一徧證者名號即萬行離念實相行也以名號中事理具足萬行圓滿故云何名號即萬行離念行也所謂法藏因地以無想離念心修行真如實相萬行離念而攝在名號十劫成覺實相備體名詮自性故眾生稱念自證得萬行離念於一徧名號經說彌陀修行心云其心寂靜心無所著矣是其無相離念相也所以名號即萬行離念行離念是無念無念即無相無相即實相實相即名號故以名號名萬行離念行亦名諸法實相諸法實相萬行離念言異意同問彼經說名號云諸法實相除滅罪法乎答大論云以佛名號為實相法矣鸞師云此十念者依善知識方便安慰聞實相法生矣名號實相蘆花明月見生無生不脫殼龍證者云云今唱名號當體即萬行離念證位是云萬行離念一徧證也人中上上妙好華者此句嘆名號修行人人中上上言通人及華妙好華者梵云芬陀利華是蓮華也經云若念佛者當知此人是人中芬陀利華矣疏云念佛三昧功能超絕實非雜善得為比類乃至故引芬陀利為喻言芬陀利者名人中好華若念佛者即是人中好人人中妙好人人中上上人人中希有人人中最勝人也爾者可云於念佛行不可有對行於念佛人不可有過人於念佛宗不可有並肩宗佛既以彼華譬此法知諸宗超過極談誰懷疑乎開題云昔毘瑠璃王害釋女大迦葉從阿耨達池取芬陀利華褁八功德水灑之諸女身心安樂命終生天矣今念佛芬陀利人身心快樂上品往生阿彌陀佛國云云又付第三句向約名號法體明萬行離念之相今若於念佛行者當位云萬行離念之行相者今名號修行人於一心處不墮得意不墮滋味不墮佛見不墮法見不墮知解不墮理會不顧有無打成一片只南無阿彌陀佛之聲計而任只有唱居名號當體即是萬行離念之行相也云云但言或云無念云實相是皆墮心地悉墮知解語何云離念者是不然今且付彼頌文學人遁作試解之時如是云之更非云一切念佛行者作此解知此意修行之元來陀力門修行何苟勞自力知解乎今念佛行者全於心地不附把柄不副按排併剝盡悟解悉𨁝跳心地既是踰自力知解悟解之垺他力格外之宗風也何云墮心地知解乎若知心地還是迷也若綺心地還是妄也莫認心地莫認心地釋論云一心一念生縛不生而為其行矣機情悟解自力聖道門尚以如此何況單直仰信他力淨土門乎若此無念約彼聖道自力修行之時轉惡愛邪我六七超八識所起想念至九識徧照內證寂證同時法界洞朗心現前之時即契當無念本心心若無念時離惡愛偏頗是非得失念故云離念是云佛果無念亦云真如無念亦云天地未分心或云父母未生已前心亦云當初一心也然我等以自力欲脩顯之識颺神飛心如猿猴是非易發無念難成若欲以心息妄妄彌增迷彌起未曾可心地發明乎今此淨土門修行不然自本佗力難思修行故佛本哀迷妄眾生自難及心地覺悟搆事理縱橫之操回相即無相之巧立萬行離念之名號與但著有相之眾生依之名號修行人不知而行實相不解而修無相不知而叶無念不覺而達真如故首楞嚴經勢至章云不假方便得心開即念佛三昧證無生忍矣一家釋云未借思量一念功不覺轉入真如門矣又云無心領納自然知矣五會讚云然念佛三昧是真無上深妙門豈同離念求無念離生求於無生離相求法身離文求解脫乎又云成佛不勞諸善業到彼自然成正覺矣當知本願難思之祕術佗力不共之益故唱名號願往生人一人不漏皆悉遂安養往生素懷十即十生百即百生之得益源在本願名號之勝利是故八幡熊野各顯本地弘誓殊以名號勸安樂往生如彼云因中萬行功納六字果號一稱益施十方兼而顯此神本地彌陀因位悲願者也禮讚云然彌陀世尊本發深重誓願以光明名號攝化十方矣本地垂迹函蓋相應感淚銘肝神妙神妙當知彌陀名號之中有如是等廣大利益多善福德種種萬法故淨土本緣經云一念彌陀佛即滅無量罪矣不論不淨不論心亂但念彌陀即得往生是以善人惡人持戒破戒一念預來迎十念遂往生大利名號無上功德教主釋尊我見是利金言恆沙諸佛廣長舌相證誠誰不修之誰不行之乎抑今本地彌陀名號往生願成就之文垂迹權現念佛勸化御納受之札字佐明神六字名號南文字之點一徧上人決定往生六十萬之勸佛神聖慮誓約無違本迹雖異利益同心出離生死頓證菩提有賴乎首楞嚴經勢至章云我本因地等云云東大寺思圓上人夢定記云一徧本地身大勢至菩薩化度眾生故來此界四度一度善導二度空也三度法然四度一徧云云實知兩神示現全是彌陀如來說法也一徧勸化併亦勢至菩薩直說也同體大悲內鑒冷然也凡夫引接順風任帆乎最可仰最可仰然則憑尚可憑者彌陀難思本誓也信尚可信者上人遊行化導也云神云佛慈悲是平等也云本云迹願力不虛名號利生有實往生成佛無疑者也尋云上人發願入滅者如何答建治二年丙子三月二十五日於大熊野證誠殿受神託始此願也正應二年己丑八月二十三日於攝州兵庫嶋入滅五十一也化導十四年也一向宗下建仁元年十月月輪禪定殿下往黑谷菴室而更推扣於竹戶源空對面時殿下問曰師兼子既三百有餘其中某甲圓照在家焉夫出家念佛與在家念佛為一乎為異乎源空答曰阿彌陀佛本願以極惡最下以為本意也豈在乎替大師釋云一切善惡凡夫得生者矣殿下紅顏微笑無於本願差別則師唯願智慧第一一生不犯出家直改為在家而於末代凡夫狐疑欲破之源空和尚少不痛至哉善信房自今日殿下奉從仰善信聞之大驚怖雙眼浮泪以衣袖蓋面以上於身仰于天手足下以扣于地咨嗟音聲震于乾坤余九歲始慈鎮和尚為弟子也而後二十九歲此禪室來今三十八歲從母胎出兮未有曾禁戒於犯焉聖人言汝六角堂一七日參籠觀音示現任焉即過一七日而詣黑谷先拜聖人聖人曰止止不可說余自得自筆書之其後汝說吾欲聞之其時親鸞曰行者宿報設如犯我成玉女身被犯一生之間能莊嚴臨終引導生極樂如合符節聖人與親鸞互一字不違眾人所謂希有也云云嗚呼大悲圓通尊應以長者居士宰官婆羅門婦女身得度者即現婦女身而為說法應以童男童女身得度者即現童男童女身而為說法所以者所何所謂和光同塵之本願結緣始其何毒醉迷亂之我等無便于授藥但菩薩念我受苦徹骨髓恆欲利益猶如一子其利益何事乎所謂道心是也世間淺近益皆為此方便也親鸞不及力禪定殿下共俱五條西洞院移其夜殿下第七息女為內室兮過三日親鸞聖人與內室共詣于黑谷禪坊源空聖人內室有對面子細無坊守也云云尋云宗教宗旨者如何答夫宗教等者法藏比丘五劫思惟故於煩惱具足我等早哉十劫以前御助故於往生成佛無疑決定焉今欲報于阿彌陀之恩施耳唯南無阿彌陀佛一向一心焉今倩思連則雙眼無乾而同俱隨喜落淚盈袂而從啟南無阿彌陀佛之寶號於此契約者今生即終焉之暮為際未來又證覺之朝為期而我等若違此旨聊有生退屈拘少事怠宗要者豈能言專此趣哉可勵彼心猶強不隨此語者永失本願宗風之本意不遂成佛伏乞阿彌陀如來知見證明仍所結如右南無阿彌陀佛其時說般若轉教付財融通淘汰此諸部般若中不說藏教帶通別二正說圓教約時則禺中時謂第四時約味則從生酥出熟酥此從方等之後出摩訶般若謂四熟酥味信解品云是時長者有疾自知將死不久語窮子言我今多有金銀珍寶倉庫盈溢其中多少所應取與此領何義答方等之後次說般若般若觀慧即是家業空生身子受勅轉教即是領知等也已上三味對華嚴頓教總名為漸亦次不思議假非偏假此假本具一切法謂不思議假者何本具一切法也一切法者何理具三千也荊溪云一家觀門永異諸說該攝十方三世若凡若聖一切因果者良由觀具具即是假假即空中是知觀此妙假即是一心三觀虎溪一心三觀之頌亦以妙假為所觀境深究觀門兹焉可見不空之言顯空亦假圓滿之言示中亦假豈非一假一切假故無空無中而不假耶四明云舉一假觀中空亦假三觀皆有立法義故應知不空與圓滿者俱即所謂立法義焉三非所簡竝皆別教何以知之以簡次第顯不次第正是一家之常途也是故四門之初門即是不可思議假初門即三三即一非一非三亦非四謂承上而頌有門初門即有門也問初門即三其義如何答境名為假假即有門觀名為空空即空門雙遮雙照名之為中雙遮即雙非門雙照即雙亦門豈非初門即三也哉問非一等者復何謂耶答即三之一與對三殊是一是三亦是四乎例如法華超於八教非一亦非八矣有門既爾餘三亦然知之一二三四指一月四點似別唯一空謂月喻三千以所指故空喻有門以能通故四番指點名為四點以喻一門乃至四門意云諸門所顯無非三千以三千外無別法故諸門似別無非有門以有門外無餘乘故故法華云唯有一乘法無二亦無三可不信乎問既言餘三亦然餘三何非餘乘答天台有云一假一切假無空中而不假例此合云一有一切有無餘三而不有若其然者有何相妨門門一一為法界攝一切法皆無餘謂法說喻陳其既彰三千有門義已雖然猶是妙解之所知而非妙行之所攝是故用此二句以示妙行之功一一為法界者以能觀理具也攝法皆無餘者以理能攝事也法界乃是無外之稱亦名中道中道乃是絕待之義亦名三千此之三千有理有事事理俱皆名一切法依義定名可以免失明知在此中者祇是事造三千故荊溪云今欲修觀但觀理具俱破俱立俱是法界任運攝得權實所現四明書中釋此文云只觀理具三千俱空假中故事用所造自然皆空假中故云任運攝得權實所現豈非釋得令義易見問中道亦對二邊何為絕待之義答二邊亡處受中道稱謂對邊者依情故耳若爾何以圓滿為立法義答圓滿為立法者約照故也中道為絕待者約遮故也彼此俱有所約何事復疑之耶不以妙假有門觀誰知法界具足法聞思修證無不妙心能觀此體具故謂初二句約不觀而說後二句約能觀而宣觀與不觀雖殊顯有門功者一言妙假有門者妙假即三千也言法界具足法者謂本具一切法也言聞思修證者謂中間四位也言體具者即理具也若祇觀心不觀具則於一觀分二家一家觀門異諸說諸說雖異觀自一彼迷一心具諸法墮在通別次第中次第而生次第斷豈知十界本來一三千本一亦如是皆非世數可分別謂荊溪云理性雖具若不觀之但言觀心則不稱理小乘何嘗不觀心耶但迷一心具諸法耳此蓋續前所引假即空中文也彼此合看可以曉了斯之文句有所本焉言一觀者以一等觀一心也言二家者謂一家與諸家也約昧具邊不殊故云觀自一也約生與斷次第故云通別等也十界同居一念故云本來一也三千非頭數法故云皆非等也問次第生斷其相如何答諸家不解修善修惡當體即是性善性惡故謂細麤次第而空亦復麤細次第而斷夫如是則無非所謂出於佛界三千入於九界三千以是之故不能信得參差九界三千即是佛界三千豈非於一佛乘虧十因緣故既能信得不妨歡然若爾經論所說不足信耶答不信即是魔屬不昧名為圓人應知圓人初心深達教證二道教道之說證道之談終至法華皆歸一實故涅槃中闍王歎云麤言及軟語皆歸第一義雖然今約證道而宣勿執教道而難若爾如似位中麤惑先落亦是教道一途說耶答不然以觀益明修惡彌融染用麤者不復現起是故說為麤惑先落修即性故如向所論若實次第而落何名體上虛妄如圓斷然偏斷亦然故荊溪云法既本妙麤由物情四明亦云眾生謂異聖意無偏學者此教明界外獨菩薩法教理智斷行位因果別前二教別後圓教故名別也涅槃云四諦因緣有無量相非聲聞緣覺所知諸大乘經廣明菩薩歷劫修行行位次第互不相攝此竝別教之相也華嚴明十住十行十廻向為賢十地為聖妙覺為佛瓔珞明五十二位金光明但出十地佛果勝天王明十地涅槃明五行如是諸經增減不同者界外菩薩隨機利益豈得定說然位次周足莫過瓔珞經故今依彼略明菩薩歷位斷證之相以五十二位束為七科謂信住行向堂等妙又合七為二初凡二聖就凡又二信為外凡住行向為內凡亦名為賢約聖亦二十地等覺為內妙覺為果大分如此自下細釋初言十信者一信二念三精進四慧五定六不退七廻向八護法九戒十願此十位伏三界見思煩惱故名伏忍位謂外凡與藏教七賢位通教乾慧性地齊次明十住者一發心住謂斷三界見惑盡與藏教初果通教八人見地齊二治地三修行四生貴五具足方便六正心七不退謂已上六住斷三界思惑盡得位不退與藏通二佛齊八童真九法王子十灌頂謂已上三住斷界內塵沙伏界外塵沙前二不知名目亦名習種性用從假入空觀見真諦理開慧眼成一切智行三百由旬次明十行者一歡喜二饒益三無違逆四無屈撓五無癡亂六善現七無著八難得九善法十真實謂斷界外塵沙惑亦云性種性用從空入假觀見俗諦開法眼成道種智次明十廻向者一救護眾生離眾生相二不壞三等一切諸佛四至一切處五無盡功德藏六入一切平等善根七等隨順一切眾生八真如相九無縛無著解脫十入法界無量謂伏無明習中觀亦名道種性行四百由旬居方便有餘土謂已上三十位為三賢亦名內凡從八住至此為行不退位次明十地者一歡喜謂從此用中道觀破一分無明顯一分三德乃至等覺俱名聖種性此是見道位又無功用位百界作佛八相成道利益眾生行五百由旬初入實報無障閡土初入寶所二離垢地三發光地四燄慧地五難勝地六現前地七難行地八不動地九善慧地十法雲地謂已上九地地地各斷一品無明證一分中道更斷一品入等覺位亦名金剛心亦名一生補處亦名有上士更破一品無明入妙覺位坐蓮華藏世界七寶菩提樹下大寶華王座現圓滿報身為鈍根菩薩眾轉無量四諦法輪即此佛也有經論說七地已前名有功用道八地已上名無功用道妙覺位但破一品無用者總是約教道說有處說初地斷見從二地至六地斷思與羅漢齊者此乃借別教位名名通教位耳有云三賢十聖住果報唯佛一人居淨土此借別教名明圓教位也如此流類甚眾須細知當教斷證之位至何位斷何惑證何理往判諸教諸位無不通達略明假宗之旨竟
