body:
  text: 真言宗下尋云真言宗者如何答真言宗者摩訶空宗也謂摩訶空三一本空宗真言宗也二雜空宗行者宗也三法空宗法相宗且真言宗者義云如來滅後六百餘歲龍猛菩薩往南天竺加持芥子七粒鐵塔戶打開親值金剛薩埵所傳受法門也依經大日如來於三世常住法界宮所説三部祕經也謂大日經金剛頂經蘇悉地經是也唐朝將來事如來滅後一千六百六十餘年唐玄宗皇帝代當開元四年中天竺三藏善無畏翻譯大日經七卷同八年南天竺金剛智三藏將來金剛頂經三卷于時玄宗皇帝貴之於長安城令弘通之也又胎藏界曼荼羅善無畏將來金剛界曼荼羅金剛智將來也我朝將來事東寺山門之真言相傳不同先東寺真言桓武天皇御宇延曆二十三年大安寺空海和尚受敕入唐值青龍寺慧果和尚胎金兩部大法并供養壇具等相傳在唐五年大同二年八月歸朝同十月嵯峨天皇奉授灌頂也次山門真言者同御宇傳教大師與弘法大師同船奉敕入唐大唐貞元二十一年四月十一日天竺善無畏三藏第三弟子奉值龍興寺順曉和尚受五部灌頂歸朝後於高雄神宮寺行灌頂奉授平城天皇是山門流真言也又仁明天皇御宇承和五年六月十三日慈覺大師奉敕入唐先值長安大興善寺翻經院政元阿闍黎受金剛界大教五瓶灌頂次從青龍等義真阿闍黎受胎藏界灌頂受真言印契并祕密法要蘇悉地大法等畢又從法全阿闍黎習胎藏界義軌受學真言畢同十三年歸朝是專山門流真言本基也又文德天皇御宇仁壽三年智證大師入唐值天竺那蘭陀寺般若多羅三藏梵字悉曇等習從法全和尚慧輪等受學兩部曼陀羅祕旨清和天皇御宇貞觀元年歸朝云云所傳聖教一千卷也慧清和天皇奉授胎藏界灌頂畢是智證流真言又三井寺流名也夫嵯峨天皇御宇空海和尚弘真言即身成佛旨諸宗不信伏之於禁中有宗論其時於清涼殿南面向南方結智拳印南門放光成金色大日諸宗歸之謂三論道昌法相源仁華嚴道雄天台圓澄其時聽衆也兮東寺之大師立二教十住心論接諸宗也二教者勝劣二教也二教對辨判勝劣意也俱舍劣成實勝乃至華嚴天台相望華嚴勝法華劣真言天台對論天台劣真言勝也例如法華昔於波羅奈轉四諦法輪今復轉最妙云無上大法輪次十住心論者初自異生羝羊心終至極無自性心九種心接世間出世一切教法第十祕密莊嚴心接得彼真言顯諸教超過也又大日經十住心品説三劫十地法門今接十住心論也其十住心者一異生羝羊心三惡四趣及外道等也二愚童持齋心者人中五戒也三嬰童無畏心者天上十善戒也已上三心接世間善惡諸法也四唯蘊無我心者聲聞四諦也五拔業因種心者緣覺十二因緣也此二接初僧祇六他緣大乘心接法相大乘也七覺心不生心者三論八不中道也此二權大乘也接第二僧祇謂上四三乘教分也八一道無為心者接天台法華宗九極無自性心接華嚴頓大法門此二實大乘一佛乘法體也接第三僧祇第十祕密莊嚴心者金剛一乘三密奧旨也以之為十住仍真言諸宗超過奧藏也云云唯小乘初劫權大乘第二劫實大乘第三劫真言十地也又祕密經云若於顯教修行者久經三大無數劫矣十住心論云九種住心無自性轉源轉妙皆是用真言密教法身説祕密金剛最勝心矣兮山門之大師顯密雖異大道無違故於一山弘兩宗矣顯密同義成異朝諸師説此義也前唐院金剛頂經疏云教有二種一顯示教諸三乘教是也二祕密教是有二種一唯理祕密教華嚴大品維摩法華涅槃等是也二事理俱密真言教是也矣唯理祕密時雖同真言天台事理俱密方勝真言山王院大師雖成顯密同義正意勝天台觀門義門成是此彼釋曰南嶽天台一心三觀理源出阿字本空理無畏不空三密同體教冥助圓頓一實旨矣此釋真言阿字能生天台一心三觀所生見又被助圓頓一實之旨云文點有之然則真言助行一心三觀正行見仍真言調心方便故不可及天台三千三觀觀法矣尋云如十住心者法華自華嚴劣也可得意歟義云山家釋云新來真言忘筆授相承舊到華嚴失影響規摸矣東寺之大師欲勝於密法山門之大師欲勝於顯法互欲建立於宗門故於此密於彼顯大矣哉兩大師於法得最自在住首楞嚴能建大義親靈山聽衆廣學內外經書通達大小教門故和光同塵之本願結緣始其何毒醉迷亂之我等無便于授藥但兩大師念我受苦徹骨髓恆欲利益猶如一子其利益何事乎所謂道心是也世間淺近益皆為此方便也問和光同塵等者以何天台曰和光同塵結緣之始八相成道利物之終矣涅槃經云是人為欲調伏如是諸比丘故與共而和光不同其塵矣又老子曰和光同其塵希逸注曰光而不露故曰和其光無塵而不自潔故曰同其塵已上所詮隱內證三身之月光更於五濁塵垓世而隨機熟有情心謂和光同塵也故八萬四千法以逆順以皆方便門夫本妙之阿字則無言説故所謂楞伽曰一字不説然則於何在乎勝劣焉龍猛智論云佛法大海以信得入矣然則勝劣者在於信不信不爾則兩宗俱共違背于祖師之釋歟請細細然其時第三祕密教者所謂祕密教文分三初標二釋三結宗旨宗教欲謂之宗教兩部界會三部五部三劫十地十六大聖等以接顯密諸教也又立四重祕釋謂淺略深祕祕中深祕祕祕中深祕也是又四重阿字也一梵王説阿字者淺略也劫初大梵天王下始出生言語謂三十五體文十二摩多都合四十七言也二大日説阿字者深祕也一佛出世成道轉大小法輪皆是不出阿字一理佛即大日應化佛身也三阿字説阿字者祕中深祕能説教主所説法門不出阿字本不生一理人法不二義也四真如理智説阿字者祕祕中深祕也謂風聲水音有情非情依報正報皆出音聲真如言説阿字説法也仍談真如言語故云真言宗也天台言説一心三觀此意也龍猛中觀論云因緣所生法謂自身總體我説即是空謂離分自空亦名為假名謂和合生有亦是中道義謂有空不二云云大日經疏三云有盡其源底空則畢竟平等中即常住不生云云若聲若字若念其初起處即是阿生也此生皆因緣生生離分無自性即是空也有空共存一阿即是中道也夫夢生者有也眠之因緣盡醒是空也有空共不出於夢之一則中道也一念之夢中三義是可念之阿字也又廣論青青翌竹鬱鬱黃花皆有有空不生三義則可見之阿字門也颯颯松風丁丁伐木盡有三義可聞之阿字門也魚母念子狗子怨塊未曾非離可念之阿字門乎哉大日經云六大無礙常瑜伽矣萬法皆具地水火風空識六大也大日六大衆生六大全無二皆是法界六大也鬼畜人天皆是大日云此意也是未運修行不凝觀念只未聞非法當位論成佛故理具云也亦次加持成佛者諸大乘經中明萬行諸波羅蜜修行積功纍德至菩提彼岸加持成佛云也指修行名加持也亦次顯得成佛者菩提心論三摩地菩提心同之謂手結印契口誦明呪意凝入我我入觀念大日三密行者三業開一體不二父母所生肉身遮那遍照覺位極顯得成佛云也此重諸宗分絶故於諸教中闕而不書云也又依釋摩訶衍論天台九識上立十識十一識也九識者眼耳鼻舌身意等六識上第七識阿陀那識第八識阿黎耶識第九識菴摩羅識也此上以一切一心識為第十以一心一心識立第十一也但立十識十一識不出天台九識也真如不變名一切一心識法性隨緣稱一心一心識也是即止觀只心是一切法一切法是心義門同之十識十一識云空海又安然所立也大日經義釋云凡説真性教皆名真言故法華等諸大乘經皆名真言祕密教矣宗旨事理俱密即身成佛也然則真言宗與天台宗非於事理而一故開於宗旨非於性具異故今合阿字本不生焉為於事理體猶尚更照於事理則即是等皆圓宗如前四時中如來三輪不思議故或為此人説頓或為彼人説漸彼此互不相知能令得益所謂如前下釋言如前四時者謂華嚴阿含方等般若之四時只是頓漸故也祕密亦是頓漸而已故指四時以明之也三輪者身口意三也輪有二義一轉義二摧碾義佛身現通佛口説法佛意照機莫非摧碾衆生惑纍如王輪寶能壞能安三輪亦爾能壞煩惱能安妙性玄義中明身輪示藥珠二身藥喻可畏破惡之形珠喻可愛生善之狀口輪示毒天二鼓毒喻説破惡法天喻説生善法心輪示隨自他意隨自如珠如天隨他如藥如毒不思議者佛之三輪非下凡心思口議也或為此人等者泛示隨機不定局也玄義中云此座説頓十方説漸説不定頓座不聞十方十方不聞頓座或十方説頓説不定此座説漸或為一人説頓或為多人説漸説不定或為一人説漸或為多人説頓或一座默十方説十方默一座説俱默俱説各不相知互為顯密於此是顯於彼是密大矣哉如來於法得最自在在首楞嚴能建大義為若此也發揮此義始自天台他宗往往竊為己見悲夫今文但云頓漸闕不定等學者知之問佛之三輪靡所不鑑宜漸説漸宜頓説頓何因緣故卻為衆生説漸得頓説頓得漸將非瀆亂衆生者乎答機緣既多宜樂亦異是故如來隨所教化宜頓説頓宜漸説漸宜頓説中而得漸等今詳於頓説中得漸益者非無所以諒是過去於頓説中有漸種子漸種既熟所以聖人為説頓法而此衆生於頓説中卻得漸益於頓得漸既然於漸得頓及以不定亦爾豈徒然哉良有以也故言祕密教所以身密口密意密三密密密之祕傳密家之真言流者總十二流往彼而尋山門之真言流者四流往彼而尋寺門之真言流者唯一流往彼而尋略明本空宗之旨竟行者宗下役小角者賀茂役公氏今之高賀茂者也和州葛木上郡茆原村人少敏悟博學兼御佛乘年三十二棄家入葛木山居巖窟者三十餘歲藤葛為衣松果充食持孔雀明王呪駕五色雲優遊仙府軀逐鬼神以為使令日域靈區修歷殆遍一日告山神曰自葛木嶺蹊金峯山其間危嶮雖苦行者猶或艱汝等架石橋通行路衆神受命夜夜運嵓石督營搆小角呵神曰何不早成對曰葛城峰一言主神其形甚醜難晝役待夜出以故遲耳小角促一言主一言主不肯小角怒呪縛繫之深谷一言主託宮人曰我是管逆冠之神也窹見役小角潛窺國家不急治殆乎危官人以聞文武帝下勒召小角小角騰空飛去不得追捕官吏設計略收其母小角不得已自來就因便配豆洲大島居三年晝守禁而居夜必登富士山行道踏海而走猶行陸其疾飛鳥不可及也黎明歸島大寶元年放回近京師凌虛飛去小角嘗在攝洲箕面山山有瀧小角夢入瀧口謁龍樹大士覺後搆伽藍自此號箕面寺為樹龍淨剎世曰小角自坐草座載母於鉢泛海入唐讚曰道德全者鬼神不得而窺矣役君神異可謂不測者焉然遭神誣受竄譴豈呪力有未充之處與古記曰道昭師在唐時五百群虎共來作禮一虎人語曰新羅山中衆虎之所伏也願師趣山導我暴獰昭默受請乃至彼講法華群虎側聽其中有和語者進曰我是日本國役小角也昭愕然問曰何在此對曰本國神曲諂是以我遁去化異類耳然或又有往矣亦可以為善應無方之一端矣而此事年代少乖故我不系本章疑又役之放逐古史或有誤乎方今攀大峰之嶮巇撥葛嶺之深邃者皆祖述于役夫行者宗有二一者本山則即天台宗是也二者當山則即真言宗是也尋云依經者如何答孔雀明王經是也所以所何謂行有二種一身行二心行子之所論者身行也豫之所修者心行也當八苦之寒風臥罪障之積雪仰阿字之大空見大日之光照淨菩提心觀慧相應念念增進豈非心行之微趣乎尋云宗旨如何答仁王般若經曰七難即滅七福即生矣不以形服而易懷也嗚呼役之化迹盛乎哉其時第四不定教者謂第四不定教文分二初正明三初標二釋三結二雙結祕密不定具化法四教二總結化儀四教亦由前四味中佛以一音演説法衆生隨類各得解此則如來不思議力能令衆生於漸説中得頓益得頓説中得漸益所謂亦由下釋祕密言四時不定言四味文互現耳妙玄中説雖高山頓説不動寂場而遊鹿苑雖説四諦生滅而不妨不生不滅雖為菩薩説佛境界而有二乘智斷雖五人證果而不妨諸天悟大當知即頓而漸即漸而頓至矣哉頓漸互通耳根聲塵佛事既爾五根五塵施化亦然故有佛土瞪視顯法現相揚眉動目微笑嚬申謦咳憶念動搖以如是等而悟道也然雖如此亦皆不出頓漸等法無非聖人之教化也亦次夫三諦者天然之性德也所謂不照本有一性莫忘逆順二修是故先示三諦而後談惑觀等問何令忘耶答論云除諸法實相餘皆名魔事今云忘者不復妄見別法耳若其然者得非性德之行乎請思之中諦者統一切法真諦者泯一切法俗諦者立一切法舉一即三非前後也所謂融然無外故云統淨然無相故云泯森然無混故云立舉一即三可自知含生本具非造作之所得也所謂生諦相即無有能具所具之別故天台云多所含容而無積聚問前言天然此言非造後言自爾非重沓耶答天然約諦而語非造就生而説後文更復言自爾者為明不變而變故耳祖言無所苟何重沓之有悲夫祕藏不顯蓋三惑之所覆也所謂煩惱業苦不並不別是為不顯之祕密藏所覆之言宜善得意故無明翳乎法性塵沙障乎化導見思阻乎空寂所謂惑為法界豈有敵對淨用永不顯故故云翳障阻耳然兹三惑乃體上之虛妄也所謂惑是修惡體是性惡以性奪修故云虛妄以虛妄故為我熊照之智以虛妄故為我所忘之境此中奇趣難言矣哉於是大覺慈尊喟然歎曰真如界內絶生佛之假名平等慧中無自他之形相但以衆生妄想不自證得莫之能返也所謂界與慧者所證之真證名究竟之照名與相者所斷之妄斷名究竟之妄照性忘修義之如返衆生不爾得不歎乎由是立乎三觀破乎三惑證乎三智成乎三德所謂能照性惡立三觀也能忘修惡破三惑也能照性善證三智也能忘修善成三德也豈非所謂忘二修哉空觀者破見思惑證一切智成般若德假觀者破塵沙惑證道修智成解脫德中觀者破無明惑證一切種智成法身德然兹三惑三觀三智三德非各別也非異時也天然之理具諸法故所謂上文合舉此文分示俱似約豎意唯在橫故云非各別等言諸法者即三千也有何一法不備然此三諦性之自爾迷兹三諦轉成三惑惑破藉乎三觀觀成證乎三智智成成乎三德從因至果非漸修也所謂初七句中具含逆順二修應知就豎而説後二句者顯示豎中有橫故云非漸修也問佛亦有所破答破與不破各見教文今通橫四於究竟者由言無明力大佛智能斷又言同體見思尚至等覺正破屬於觀破已為智也説之次第理非次第所謂縱是橫四説必次第況富於慈更宣豎五然亦須知能照本有之性言語亦非言語能忘逆順之修四三亦非四三如是則豈非無外乎三諦耶若然者豈非不可思議境耶審之審之豈得執一端而局於通道耶亦復佛以一音等者文出維摩經中一音之言有大有小小乘一音如毗曇云一音者梵音也佛為四王作聖語説四諦二解二不解佛又作毗陀羅語説一解一不解佛又作梨車語説四王俱解所以然者為欲滿足諸天心故二天王作如是念佛若為我作聖語説我則能解一天王作如是念佛若為我作毗陀語説我則能解一天王作如是念佛若為我作梨車語説我則能解故隨其念而為説之悉皆得解毗陀語者伊禰彌禰踏被陀踏被彼梨車語者摩奢兜奢僧奢摩薩婆多毗羅緻此即四諦也大乘一音如起信云圓音一演異類等解又當分一音即施權也跨節一音即開權也今既頓漸不定一音該乎大小未至法華則非跨節也如是得益不同故言不定教也然祕密不定二教教下義理只是藏通別圓化儀四教齊此略明雜空宗之旨竟法相宗下如來滅後一百年後摩訶提婆菩薩出世為阿育大王説諸法實有法可謂此宗根元歟其後阿僧伽謂此云無著論師出世夜登都率天傳彌勒法晝降天竺阿瑜闍國於重閣講堂為衆説法瑜伽論百卷是也其後無著世親戒賢等次第爰世親菩薩造唯識三十頌護法青辨等十大論師各造十卷釋論合百卷也玄弉三藏渡天時申戒賢論師末代學者不可學得云略為十卷也於中九大論師義為不正義護法義為正義唯識論十卷云是也尋云震旦傳來者如何答如來滅後一千五百七十九年唐太宗皇帝治三年貞觀三年已丑八月唐玄弉三藏生年二十九歲入天竺同六年壬辰至中天竺大那爛寺奉值戒賢論師謂生年一百四習瑜伽唯識並學俱舍論同十九年乙巳歸唐土抑戒賢論師親奉受彌勒菩薩兼承無著世親又值護法論師傳此法也次玄弉弘此法時有三千人弟子其中有七十人長者其中又有四人達者謂昉法師尚法師光法師基法師也其中以基法師為寫瓶弟子慈恩大師是也此師所立名法相宗也云云尋云日本將來者如何答日本傳來前後有四一孝德天皇御宇道昭和尚入唐值玄弉傳此法將來二人王第三十六代皇極天皇治七年大化四年戊午正月七日沙門智通智達二人奉敕乘新羅國船入唐奉值玄弉受法相宗並俱舍宗將來云云又有日記智通智達齊明天皇御宇入唐云三天武天皇治九年朱鳥五年庚辰玄弉弟子新羅國智鳳法師一切律論傳來同御宇白鳳十四年甲戌於川原寺始書一切經論日本義淵僧正傳此法我朝朗辨僧正等義淵弟子也又有日記智鳳智鸞智雄三師文武天皇御宇大寶三年癸卯入唐謁撲揚大師謂智周傳此宗義淵受鳳鸞二師玄昉行基義淵弟子也四第四十四代元正天皇治九年養老七年癸亥南都玄昉僧正入唐在唐八年第四十五代聖武天皇治七年天平一年康午五千餘卷一切經論傳來云云又有日記云玄昉法師元正天皇御宇靈龜二年丙辰入唐遇撲揚大師學法經二十年聖武御宇天平七年乙亥七月歸朝弘法云云仍相違可明之云云抑當時於興福寺相續次第義淵僧正下有宣教大法師自其以來賢璟明福延賓空晴真義林懷主恩永超洪秀覺晴義俊覺憲貞慶等解脫上人等次第相續尋云所依經論者如何答依六經十一部論也六經者一華嚴經二解深密經三如來出現功德莊嚴經四阿毗達磨經五楞伽經六厚嚴經也十一論者一瑜伽論二顯揚論三莊嚴論四集量論五攝大乘論六十地論七分別瑜伽論八觀所緣論九唯識論十辨中菩薩論十一入正理論也但阿毗達磨厚嚴二經未度經也故當時加法華涅槃為六經也尋云此等經論中取分以何為正證耶答殊以深密經為本源彼經明有空中三時教故也又以瑜伽論為憑據以唯識論為宗中道為相五重唯識為境云云尋云宗教者如何答立三時教攝一代初時教名有相教説人空法有相阿含等諸部小乘經等攝之第二時教名無相教立人法俱空相攝諸部般若經也第三時教名非有非空中道教立人法非空非有相也攝華嚴深密思益法華涅槃等抑立三時教事解深密經中勝義生菩薩領解一代相也云云尋云次位者如何答唯識論立五位攝三阿僧祇一資糧位者大乘順解脫分也是十信十住十行十回向位也二加行位大乘順決擇分也是第十回向後心也已上二位為初僧祇位也三通達位諸菩薩斷見位也是初歡喜地也第二僧祇劫也四修習位諸菩薩修道位也是從第二離垢地至第十法雲地也五究竟位即無上正等菩提位也是第三僧祇劫也云云此宗意法華等須臾聞之即得究竟説為勸怯弱機方便也餘經中經塵劫成佛云為懈慢機方便説也實説一切衆生必經三僧祇成佛也起信論云以一切菩薩皆經三阿僧祗劫矣問於何位立四善根耶答一家天台別教於地前三十心立四善根也謂十住暖十行頂也忍有三忍下中同頂對十行上忍同世第一對十向也記七云豈有大乘回向而齊小乘上忍等矣是依婆沙一説也又舊譯攝論其相見依之舊譯攝論十一云願樂行人有四種謂十信十住十行十回向為菩薩聖道有四種方便故有四人如須陀洹道前有四種方便矣但唯識論意於十回向中開四善根也抑十回向中開之歟將第十回向外立之歟一箇疑也此事異義有之山王院釋云以四加行為近資糧此在向後初地之前故名地前非指三十心為地前也是慈恩釋意也十回向外立之也又入道章云前二十九心全第三十少分而屬資糧三十心少分屬後加行矣是第十向後心立之也山王院釋云別中四十心為外內凡十地等妙為分極聖四十心中十信為外凡住行向為內凡地等分聖後一極聖彼此共呼內凡位為四善根此瓔珞等諸大乘經所説也近首楞嚴經及唯識論於十回向後心立四加行位名同初教也三十頌二十七行云現前立少物謂是唯識止性以有所得故非實住唯識記家以三十心為遠資糧以四加行為近資糧此在向後初地之前故名地前非指三十心為地前也又名三十心為順決擇分位也諸師多云開第十回向出四加行位此經論隨宜開合不定合為三十心開為四加行位何謂非佛意四悉檀説本如是耳今宗就合以三十心為四加行釋出如玄文矣有抄云論正義十向外立四善根不正義意第十向內立之云云尋云宗旨者如何答凝然常住不作諸法云不明真如緣起也所以真如妙理堅密物散壞成諸法事無之是此華嚴天台等明隨緣真如難之也謂既隨緣云依妄法緣九界妄法成其體更非真如堅密不成餘法也仍不遍諸法真如惡得意隨緣真如談歟云云又彼宗立五性各別義舉永不成佛一類事不明真如緣起故也若夫無性定性自真如緣起還可歸真如故不成佛不可云又唯識論云四智品所依常故無斷盡故亦説為常非自性常從緣生故矣四智獨無常也此智依止真如時真如被引常住云也是此境智各別宗云此意也所謂宗旨正意真如不遍萬法不作諸法云也尋云五性各別者如何答楞伽經云一者聲聞乘性二者辟支佛乘性三者如來乘性四者不定乘性五者無性證法矣瑜伽論云一者菩薩種性二者獨覺種性三者聲聞種性四者不定種性五者無種性矣是法爾五性云無始以來法爾天然五種性相分云也依之佛地論云由法爾故無始時來有五種性矣但楞伽瑜伽二説相違然論云菩薩性經云如來性其心同之歟尋云天台意如何可得心耶答守護章下中云其法爾種子西方論師都不許唐國疏師亦不許一切經中無所説故矣又云建立畢竟無性彼瑜伽所出毗曇薩婆多等許約聲聞地決擇小義彼三乘教未説小乘帶小説大其瑜伽中多有小乘義矣尋云師資相承者如何答法相宗大覺世尊彌勒無著等次第餘宗二十三附法次第師子尊者被害檀彌羅王附法既絶畢爰法相一宗釋尊佛法悉附屬彌勒彌勒無著相承不可似餘家甚深附法是此三國附法無斷絶宗獨我宗也云云難云十大論師中護法義為正義然自護法論師至戒賢其中問時節久是故面授附法少斷絶如何答護法正義九人不正義竪次第時前後流轉何相承可斷絶耶其上玄奘渡天自天竺相承三國不斷宗云事無子細歟尋云五法三自性八識二無我者如何答五法者名相分別正智如如也楞伽經見一名者諸法名也二相者諸法相也三分別者諸法差別也四正智者從緣生智慧也五如如者諸法所依真如理也云云次三自性者一反考反恐邇歟計所執性謂五法中名相分別也是即本無今有妄念也二依他起性是第八識自性分別從緣生正智也三圓成實性是萬法所依無分別如如真如也五法中第五是也云云次八識者六識名相分別反考反恐邇歟計所執性也七八識正智也但如如非識性性所依故非八識所攝云云次二無我者人無我謂生空法無我謂法空云云決三云況復五法及三自性八識二無我全是別義矣尋云斷惑者如何答唯識論煩惱所知二障各立分別俱生又分別俱生現行種子習氣三有之云云凡小乘俱舍等煩惱限現行不明種子習氣大乘意現行上有種子雖斷種子尚有習氣云斷之云云唯識論十云煩惱障中見所斷種於極喜地見道始斷彼障現起地前已伏修所斷種金剛喻定現在前時一切頓斷彼障現起地前漸伏初地已上能頓伏盡所知障中見所斷種於極喜地見道初斷彼障現起地前已伏修所斷種於十地中漸次斷滅金剛喻定現在前時方永斷盡彼障現起地前漸伏乃至十地方永伏盡矣記二云然依五性宗中以見疑無明等種子為無明住地今意不爾五住為二死作因望唯識等但加種子為異耳矣請學者相宗與台宗異説於前於後細細然考圖揭左凡法相意現行皆云伏種子皆名斷也現行名斷事無之先自初住至第十向煩惱所知二障分別起現行伏至初地二分別起種子斷也煩惱俱生起現行於初地皆伏也種子七地為利生留也留煩惱障助願我執新譯迷理惑現行地前已伏煩惱障分別三種子見道無間道斷人執舊譯見惑習氣見道解脫道斷前六識俱生現行地前漸伏初地已上頓伏種子金剛無間道斷迷事惑俱生二習氣地地漸斷無間道永斷義也解脫道斷正義也修惑現行初地已上漸伏第七地永伏第七識俱生種子金剛無間斷習氣無間道斷解脫道斷現行初地漸伏八地永伏前六識俱生種子地地漸斷法執習氣金剛無間斷所知障分別知前俱生二現行地地惑伏惑起金剛加行道永斷第七識俱生種子金剛無間道斷習氣無間道斷解脫道斷受生矣八地已上任運遍滿利衆生故留煩惱故不沙汰也而煩惱障俱生起種子金剛喻定皆斷十地間斷事不云也又所知障俱生起現行地地漸伏種子地地漸斷其故初地俱生現行於地前伏俱生種子於初地斷二地俱生現行初地伏種子二地斷也又妙覺障所知障俱生現行十地伏種子金剛喻定斷也云云尋云所知障漸斷意如何答煩惱俱生為利生故留也不斷所知障者暗所知境故漸伏漸斷也又斷種子現行自被斷故以前伏云種子斷時現行斷不云也又法相反考反恐邇歟計云捨煩惱云斷也輔行記引唯識云此二法所知障分別俱生執細故難斷後十地中數數修習勝法空觀方能除滅矣又云此二煩惱障分別俱生粗故易斷入初地時觀一切法法空真如即能除滅矣尋云斷二障得何等果耶答慈恩唯識疏云由轉煩惱得大涅槃轉所知障證無上覺矣二轉依者是也依者依他起云事也尋云天台宗意彼法相教觀四教中何分齊可得意耶答記一云他釋但有自覺等三既無四教各具三義如何分別大小教主與而言之不出二教矣輔云不出二教者他人釋佛亦云斷習氣故屬通佛也若奪而言之只得三藏佛耳矣是藏通分齊釋又妙樂一處釋云唯識等文但明別義矣但五大院名別義通分釋兮法相宗意三乘真實一乘方便如常焉其時明方等部淨名等經彈偏析小歎大褒圓四教俱説藏為半字教通別圓為滿字教對半説滿故言對教若約時則食時謂第三時若約味則從酥出生酥此從九部出方等謂三生酥味信解品云過是已後心相體信入出無難然其所止猶在本處此領何義答三藏之後次説方等已得道果心相體信聞罵不瞋內懷慚愧心漸淳淑不輕品云得大勢以何因緣名常不輕是比丘凡有所見若比丘比丘尼優婆塞優婆夷皆悉禮拜讚歎而作是言我深敬汝等不敢輕慢所以者何汝等皆行菩薩道當得作佛而是比丘不專讀誦經典但行禮拜乃至遠見四衆亦復故往禮拜讚歎而作是言我不敢輕於汝等汝等皆當作佛故四衆之中有生嗔恚心不淨者惡口罵詈言是無智比丘從何所來自言我不輕汝而與我等授記當得作佛我等不用如是虛妄授記如此經歷多年常被罵詈不生瞋恚常作是言汝當作佛説是語時衆人或以杖木瓦石而打擲之避走遠住猶高聲唱言我不敢輕於汝等汝等皆當作佛以其常作是語故增上慢比丘比丘尼優婆塞優婆夷號之為常不輕是此明通教者通前藏教通後別圓故名通教中論問曰阿毗曇人言諸法從四緣生云何言不生何謂四緣因緣次第緣緣緣增上緣四緣生諸法更無第五緣一切所有緣皆攝在四緣以是四緣萬物得生因緣名一切有為法次第緣除過去現在阿羅漢最後心心數法餘過去現在心心數法緣緣增上緣一切法又從當教得名謂三人同以無言説道體色入空故名通教解曰又從下就當教釋通者同也所謂聲聞緣覺菩薩三人同以無言説道體色入空言説在事無言是理問曰以何言説者在乎事無言者是理乎答曰言説者在於大道之事無言者是真空之理也道即觀智道事即理即理之道無生道也以此之道體解六凡諸法色心如幻如化幻有之俗但有名字問曰如何幻有之俗者但有乎名字答曰幻有之俗者則即相空故所以但有名字謂之耳止觀五十四云名字不在內外中間常自有等所以即空幻有即空真諦也即此三人通同之義約所證同故前文云通前藏也約教有異故今又就無言説道體色空也復次須知教理智斷行位因果此八皆通三乘之人何者同稟無生教通也同緣即色是空理通也諸法不生般若不生智通也須陀洹若智若斷是無生忍斷通也皆乘摩訶衍行通也同行十地位通也同學般若因通也同到薩婆若果通也亦次中論曰汝先説有生住滅相故有有為以有有為故有無為今以理推求三相不可得云何得有有為如先説無有無相法有為法無故何得有無為無為相名不生不住不滅止有為相故名無為相無為自無別相因是三相有無為相如火為熱相地為堅相水為冷相無為則不然問曰若是生住滅畢竟無者云何論中得説名字答曰如幻亦如夢如乾闥婆城所説生住滅其相亦如是生住滅相無有決定凡人貪著謂有決定諸賢聖憐愍欲止其顛倒還以其所著名字為説語言雖同其心則異如是説生住滅相不應有難如幻化所作不應責其所由不應於中有憂喜想但應眼見而已如夢中所見不應求實如乾闥婆城日出時現而無有實但假為名字不久則滅生住滅亦如是凡夫分別為有智者推求則不可得所以佛説大乘諸法若有色無色有形無形有漏無漏有為無為等諸法相入於法性一切皆空無相無緣譬如衆流入海同為一味實法可信隨宜所説不可為實是故無緣緣增上緣者若略廣因緣中無果云何言果從因緣出依大品經乾慧等十地即是此教位次也一乾慧地未有理水故得其名即外凡位與藏教五停心總別等三位齊二性地相似得法性水伏見思惑即內凡位與藏教四善根齊三八人地四見地此二位入無間三昧斷三界八十八使見盡發真無漏見真諦理與藏教初果齊五薄地斷欲界九品思前六品與藏教二果齊六離欲地斷欲界九品思盡與藏教三果齊七已辨地斷三界見思惑盡但斷正使不能侵習如燒木成炭與藏教四果齊聲聞位齊此八辟支佛地更侵習氣如燒炭成灰九菩薩地正使斷盡與二乘同扶習潤生道觀雙流遊戲神通淨佛國土所謂菩薩地見思已亡名正使盡此約自行故同二乘若欲利他則須扶習扶謂扶持習即見思之氣分也潤謂潤益生即分段之形生也所謂扶持見思之氣分而潤益故受生焉良以通教不明中道應本何能稱物施為是故菩薩雖斷正使不專證空慈悲愍物欲濟含生其如見思先已斷訖更無惑業而致受生所以扶持正使氣分作利生本仍須先時故留餘習方可扶持更加帶空之心及以四弘之願潤生三界利樂有情當此之時深觀二諦進斷習氣色心無知塵沙劣慧既亦斷之法眼種智於是明矣應知習氣不能潤生今此但是故留而已又復扶習唯在通教言道觀者道謂化導觀即空觀帶空出假此二俱行故曰雙流出假化物遊諸世間譬如兒戲故云遊戲大論中問神通所作何名遊戲答猶如幻師種種變現菩薩亦爾是故名戲又三三昧中空為上諸餘行法皆名為下下如兒戲問菩薩但當出生三昧何須遊戲答菩薩心已出生三昧欣樂出入亦名遊戲神名天心通名慧性天然之慧徹照無礙故名神通因中説果名淨佛土若諸衆生見心熾盛慳貪蔽重菩薩化之令生正見無所吝惜願成佛時國土清淨一切正見能捨衆生來至其國是名因中淨果佛土此一既然破戒嗔恚懈怠散亂愚癡等蔽亦皆準説淨名記云三藏教中無淨土教但以煩惱潤業而生故於穢土成佛無爽有六度行無淨土教教無行缺終無成佛無淨土因無行之佛有教無人六度之行有因無果行既無果反成無行通人亦云修淨土行若任當教雖有其文乃寄利人堪被接者通教菩薩有淨土行知十方佛二乘道理不合知之自鄙不發永不求故菩薩雖知佛猶永滅永滅乃與取土義乖故知此佛無人有教教既權施不稱因行故於權教不須苦窮準支佛見百佛世界亦合應知有十方佛唯恐見處不知有佛又只一界唯一佛化知亦無妨故二十部亦有許知十方佛者此亦宜為大教梯漸故二乘人亦知亦不知通教菩薩修淨土因若依跨節是則淨土義通諸教故有四土橫竪攝物由攝生時有五差故所謂人天及四教也十佛地機緣若熟以一念相應慧頓斷殘習坐七寶菩提樹下以天衣為座現帶劣勝應身成佛所謂十佛地分三初成佛案妙玄中共位菩薩別立忍名第十佛地成佛之相誓扶餘習生閻浮提八相成道前之五相與三藏同唯成佛相於道樹下得一念相應慧與無生諦理相應慧煩惱習名為佛也故此一念相應之慧不可謂之三十四心應知只是空慧念耳斷殘習者以菩薩時斷正使竟留餘氣分故今但斷殘習成佛殘即正使之餘氣也準大論中金銀琉璃車渠頗黎赤珠碼瑙是名七寶木樹是劣七寶是勝表通教法勝過三藏天衣化生表一切法皆如幻故與三藏佛所證是同名現帶劣本通教佛所現身量十里百億放光巍巍異於三藏丈六一里故云勝應或云但空名為帶劣不空中道名為勝應以通教有合身義故華嚴成道其唯別圓鹿苑所明三藏丈六兩處初成不云通佛方等般若乃論八相故知聖應隨順物機若云祕密二處不無為三乘根性轉無生四諦法輪緣盡入滅正習俱除如炭灰俱盡經云三獸度河謂象馬兔諭斷惑不同故又經云諸法實相三乘皆得亦不名佛即此教也此教三乘因同果異證果雖異同斷見思同出分段同證偏真然於菩薩中有二種謂利鈍鈍則但見偏空不見不空止成當教果頭佛行因雖殊果與藏教齊故言通前若利根菩薩非但見空兼見不空不空即中道分二種謂但不但若見但中別教來接若見不但中圓教來接故言通後所謂若利下釋通後二初正釋非但見空先暫同鈍兼見不空後彰於利一人先後不同故云非但兼見既云不空正當中道中道即是別圓所詮別詮但中不具諸法如雲外月似出水華圓詮不但即具二邊然一家明中道復二一離斷常屬前二教二約佛性為後二教教權故但理實名中斯是別教佛性之中圓教稱實寂而常照一切無非遮那中道雖但不但皆名利根通後別圓其義如是問四教釋義罄無不盡何須更明受接之説答豈聞受接非四教乎是故須知初後咸同故云四教始終殊異故云受接三接雖分大乘攝盡何須難於更明接耶故大品經八地聞中九地修中如此説者非通非別通教始終不觀常住別人初地已證中道豈可八地方聞中耶故須約接以銷此文經從下根云八九地準義合有中上二根是故即有三根受接仍分三種謂圓接通圓接別別接通也所云接者中道接真如金接鍮二物相接是故云耳從下根者為欲示於真內中故故待證空方為點示令深觀空即見不空中上二根亦見真已方示中空但由中上真空既淺是故説教多附下根問接義為在法華之前亦通法華答五時皆有何須定之然則須知交際之接在法華前名會之接在於法華鹿苑密論涅槃追説是故五時通皆有接問接唯菩薩亦通二乘答法華前接則唯菩薩密通二乘法華中接非但二乘亦兼菩薩故法華中接三乘者皆約顯露法華已前接於菩薩復亦如是問受接被接此二何別答一往分之受接約機被接約應究而論之亦何隔別問接獨機然在應亦爾答感應道交不可偏矣問接已為在通第十地為居別圓初地初住答從舊從本是第十地從教從證在於地住略如向説廣在諸文問何位受接進入何位答受接人三根不同若上根三地四地被接中根之人五地六地下根之人七地八地所接之教真似不同若似位被接別十回向圓十信位若真位受接別初地圓初住問此藏通二教同是三乘同斷四住止出三界同證偏真同行三百由旬同入化城何故分二答誠如所問然同而不同所證雖同大小巧拙永異此之二教是界內教藏是界內小拙不通於大故小折色入空故拙此教三人雖當教內有上中下異望通三人則一槩鈍根故須拆破也通教則界內大巧大謂大乘初門故巧謂體色入空故雖當教中三人上中下異若望藏教則一槩為利問教既大乘何故有二乘之人答朱雀門中何妨庶民之出入故人雖有小教定是大大乘兼小漸引入實豈不巧故般若方等部內共般若等即此教也略明摩訶空宗之旨竟
